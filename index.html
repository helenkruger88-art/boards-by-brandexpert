<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Boards by Brand Expert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --accent:#C75B12; --accent-soft:#FBF1E8;
  --bg:#F7F6F3; --card:#FFFFFF; --ink:#23241f; --muted:#8a887e;
  --line:#E7E5DE; --line-strong:#D6D3C9;
  --ok:#1D9E75; --danger:#C6453D; --warn:#BA7517;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;font-size:13.5px}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;width:100%;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 5px}
h1,h2,h3{font-weight:700;letter-spacing:-.01em}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-weight:600;font-size:13.5px;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn.accent{background:var(--accent)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:var(--bg);opacity:1}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line-strong);border-radius:16px;padding:6px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:12px;padding:3px 10px;font-size:11.5px;font-weight:700;color:#fff;background:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.avatar{width:30px;height:30px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top))}
.wordmark{font-weight:800;font-size:16px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px;cursor:pointer}
.wordmark em{font-style:normal;color:var(--accent)}
.wordmark small{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.04em}
.tabs{display:none;gap:2px;margin-left:14px}
.tabs button{padding:8px 13px;border-radius:9px;font-weight:600;font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.tabs button.active{background:var(--accent-soft);color:var(--accent)}
.tabs button:hover{color:var(--ink)}
main{padding:16px;max-width:1280px;margin:0 auto;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(8px + env(safe-area-inset-bottom))}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:10px;position:relative}
.bottomnav button.active{color:var(--accent)}
.bottomnav .bdot{position:absolute;top:0;right:4px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px}
.view-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 0 14px}
.view-title h2{font-size:20px}
.view-title .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.boards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:14px}
.board-card{background:#fff;border:1px solid var(--line);border-top:4px solid var(--accent);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.board-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(35,36,31,.08)}
.board-card h3{font-size:15.5px;margin-bottom:3px}
.board-card .meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.prog{height:7px;background:var(--bg);border-radius:5px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .3s}
.prog-row{display:flex;justify-content:space-between;font-size:11.5px;font-weight:600;color:var(--muted);margin-top:6px}
.new-board{border:1px solid var(--line-strong);background:#FFFEFB;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-weight:600;min-height:130px;cursor:pointer}
.new-board:hover{color:var(--accent);border-color:var(--accent)}
.catbar{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.catbar::-webkit-scrollbar{display:none}
.catchip{flex:none;display:inline-flex;align-items:center;gap:7px;border-radius:18px;padding:8px 15px;font-size:12.5px;font-weight:700;color:#fff;opacity:.55;cursor:pointer;white-space:nowrap}
.catchip.sel{opacity:1;box-shadow:0 3px 10px rgba(35,36,31,.18)}
.catchip .cnt{font-size:10.5px;font-weight:800;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 7px}
.board-wrap{display:flex;gap:14px;align-items:flex-start}
.rail{display:none;flex-direction:column;gap:7px;width:150px;flex:none}
.rcol{display:flex;align-items:center;gap:7px;border-radius:10px;padding:10px 12px;color:#fff;font-weight:700;font-size:12.5px;opacity:.6;cursor:pointer;text-align:left}
.rcol.sel{opacity:1;box-shadow:0 3px 10px rgba(35,36,31,.18)}
.rcol .rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcol .rcount{font-size:10.5px;font-weight:800;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 7px}
.add-rail{border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px;font-weight:600;color:var(--muted);font-size:12px}
.add-rail:hover{color:var(--accent);border-color:var(--accent)}
.open-col{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.col-head{display:flex;align-items:center;gap:9px;padding:13px 16px;color:#fff}
.col-head h3{flex:1;font-size:15px}
.col-head button{color:#fff;opacity:.75;padding:3px}
.col-head button:hover{opacity:1}
.col-head .count{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.22);border-radius:10px;padding:2px 9px}
.quickadd{display:flex;gap:8px;margin:14px 16px 0}
.quickadd input{border-radius:10px}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:12px;padding:14px 16px 18px}
.note{background:var(--note-bg,#fff);border:1px solid var(--line);border-left:4px solid var(--note-c,var(--accent));border-radius:10px;padding:12px 12px 10px;cursor:pointer;position:relative;transition:transform .1s,box-shadow .1s}
.note:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(35,36,31,.09)}
.note h4{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:5px;padding-right:18px}
.note p{font-size:12px;color:#6b695f;line-height:1.45;margin-bottom:7px;white-space:pre-wrap}
.note.done{opacity:.5}
.note .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.note .who{font-size:10.5px;font-weight:700;color:var(--muted);flex:1}
.note .avatar{width:21px;height:21px;font-size:9px}
.note-del{position:absolute;top:7px;right:7px;color:#a3a094;opacity:0;transition:opacity .15s;padding:2px}
.note:hover .note-del{opacity:.9}
.note-del:hover{color:var(--danger)}
@media(hover:none){.note-del{opacity:.5}}
.due{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;margin-bottom:6px}
.chk{width:19px;height:19px;border-radius:6px;border:2px solid var(--line-strong);background:#fff;color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex:none}
.chk.on{background:var(--ok);border-color:var(--ok)}
.task-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-left:4px solid var(--c,var(--accent));border-radius:10px;background:#fff;margin-bottom:8px}
.task-row .t{flex:1;min-width:0}
.task-row .t b{display:block;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row .t span{font-size:11px;font-weight:600;color:var(--muted)}
.task-row.done{opacity:.55}
.member-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.member-row .m{flex:1;min-width:0}
.member-row .m b{display:block;font-size:14px}
.member-row .m span{font-size:11.5px;color:var(--muted)}
.rolebadge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border-radius:8px;padding:2px 8px;background:var(--accent-soft);color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(35,36,31,.45);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:4px}
.row{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:80;display:flex;gap:14px;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:92vw}
.toast button{color:#FFC98F;font-weight:800}
.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:22px}
.auth-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 24px;width:100%;max-width:400px}
.auth-card h3{font-size:18px;margin-bottom:2px}
.auth-card .sub{font-size:13px;color:var(--muted);margin-bottom:10px}
.auth-err{background:#FDECEA;color:#A32D2D;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:600;margin:10px 0 0;display:none}
.cobrand{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));right:12px;z-index:15;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:11px;font-weight:700;color:var(--muted);box-shadow:0 4px 14px rgba(35,36,31,.08)}
.cobrand b{color:var(--accent)}
.swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.swatches button{width:34px;height:34px;border-radius:50%;border:3px solid transparent}
.swatches button.sel{border-color:var(--ink)}
.settings-grid{display:grid;gap:14px;grid-template-columns:1fr}
.empty{color:var(--muted);font-weight:500;font-size:13.5px;padding:14px 4px}
@media(min-width:840px){
  .tabs{display:flex}
  .bottomnav{display:none}
  main{padding:22px 28px;padding-bottom:40px}
  .rail{display:flex}
  .catbar{display:none}
  .overlay{align-items:center;padding:20px}
  .modal{border-radius:18px;padding:24px}
  .toast{bottom:28px}
  .cobrand{bottom:14px}
  .settings-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<script>
/* ============ CONFIG & STATE ============ */
const SUPABASE_URL='https://gpztlbbyylwkcykocczm.supabase.co';
const SUPABASE_KEY='sb_publishable_deJICRsdUfBSTfdYRO7EUw_yLKUCeiG';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const PRESETS={
  classic:{accent:'#C75B12',soft:'#FBF1E8'},
  forest:{accent:'#0F6E56',soft:'#E7F4EF'},
  magenta:{accent:'#C4006B',soft:'#FBE9F2'},
  ocean:{accent:'#185FA5',soft:'#E9F1F9'},
  slate:{accent:'#444441',soft:'#EFEEE9'},
};
const CYCLE=['#0F6E56','#C75B12','#534AB7','#185FA5','#993556','#BA7517','#3B6D11','#444441','#0E7490'];
let SESSION=null, WS=null, MEM=null, MEMBERS=[], BOARDS=[], MYWS=[];
let S={view:'today',board:null,col:null};
let cur={cols:[],notes:[],msgs:[],invs:[],pins:[],posts:[]};
let TD=[], TDN={}, TDC={};
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const Rand=v=>'R'+Number(v||0).toLocaleString('en-ZA',{maximumFractionDigits:0});
const saDate=()=>new Date(Date.now()+2*3600*1000).toISOString().slice(0,10);
function tint(hex,pct){const n=parseInt(hex.slice(1),16),r=n>>16,g=(n>>8)&255,b=n&255;
  const m=c=>Math.round(c+(255-c)*(1-pct/100)); return `rgb(${m(r)},${m(g)},${m(b)})`;}
function ago(ts){const s=(Date.now()-new Date(ts))/1e3;
  if(s<60)return 'now'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d';}
const avatar=u=>`<span class="avatar" style="background:${u.color}" title="${esc(u.name)}">${esc(u.initials)}</span>`;
const usr=id=>MEMBERS.find(m=>m.user_id===id);
function fail(e){console.error(e); toast('⚠ '+((e&&e.message)||e));}
/* icons */
const ICONS={
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2.2M12 19.8V22M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M2 12h2.2M19.8 12H22M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6"/>',
  board:'<rect x="3" y="3" width="18" height="18" rx="2.5"/><path d="M7 7v10M12 7v6M17 7v3"/>',
  note:'<path d="M4 4h12.5L20 7.5V20H4z"/><path d="M16.5 4v3.5H20"/>',
  money:'<circle cx="12" cy="12" r="9"/><path d="M14.6 9.2a2.4 2.4 0 0 0-2.2-1.4h-.9a2.3 2.3 0 0 0 0 4.6h1a2.3 2.3 0 0 1 0 4.6h-1a2.4 2.4 0 0 1-2.2-1.4"/><path d="M12 6.2v1.6M12 16.6v1.6"/>',
  users:'<path d="M16.5 21v-1.9a3.9 3.9 0 0 0-3.9-3.9H5.4a3.9 3.9 0 0 0-3.9 3.9V21"/><circle cx="9" cy="7.4" r="3.9"/><path d="M22.5 21v-1.9a3.9 3.9 0 0 0-2.9-3.8"/><path d="M15.6 3.6a3.9 3.9 0 0 1 0 7.6"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h.01a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>',
  calendar:'<rect x="3.5" y="5" width="17" height="16" rx="2"/><path d="M16 3v4M8 3v4M3.5 10.5h17"/>',
  alert:'<path d="M10.3 4 2.2 17.6A2 2 0 0 0 3.9 20.6h16.2a2 2 0 0 0 1.7-3L13.7 4a2 2 0 0 0-3.4 0z"/><path d="M12 9.5v4M12 17h.01"/>',
  trash:'<path d="M3.5 6.5h17"/><path d="M8.5 6.5v-2a1.6 1.6 0 0 1 1.6-1.6h3.8a1.6 1.6 0 0 1 1.6 1.6v2"/><path d="M18.8 6.5 18 19.3a2 2 0 0 1-2 1.9H8a2 2 0 0 1-2-1.9L5.2 6.5"/><path d="M10 10.7v6M14 10.7v6"/>',
  pencil:'<path d="M16.9 3.6a2.6 2.6 0 0 1 3.7 3.7L7.6 20.3 2.5 21.5l1.2-5.1z"/>',
  x:'<path d="M17.5 6.5l-11 11M6.5 6.5l11 11"/>',
  check:'<path d="M19.5 6.5 9.6 16.9 4.5 11.8"/>',
  lock:'<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  undo:'<path d="M3.5 7.5v5.5h5.5"/><path d="M20.5 16.5a8.5 8.5 0 0 0-14.2-6.3L3.5 13"/>',
  link:'<path d="M10 13.3a5 5 0 0 0 7.5.6l2.9-2.9a5 5 0 0 0-7-7L11.7 5.6"/><path d="M14 10.7a5 5 0 0 0-7.5-.6l-3 3a5 5 0 0 0 7 7l1.8-1.6"/>',
  home:'<path d="M3 11.5 12 3l9 8.5"/><path d="M5.5 10.5V21h4.8v-6h3.4v6h4.8V10.5"/>',
};
const ic=(n,s=15,st=1.8)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${st}" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex:none">${ICONS[n]||''}</svg>`;
/* toast with optional undo action */
let _toastT=null,_toastFn=null;
function toast(msg,actionLabel,actionFn){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  clearTimeout(_toastT); _toastFn=actionFn||null;
  const el=document.createElement('div'); el.className='toast';
  el.innerHTML=`<span>${msg}</span>${actionLabel?`<button onclick="_toastFn&&_toastFn();this.parentElement.remove()">${actionLabel}</button>`:''}`;
  document.body.appendChild(el);
  _toastT=setTimeout(()=>el.remove(),actionLabel?6000:3200);
}
/* plan */
function planEff(){
  if(!WS)return 'free';
  if(WS.plan==='pro')return 'pro';
  if(WS.plan==='trial'&&WS.trial_ends>=saDate())return 'pro';
  return 'free';
}
function trialDaysLeft(){
  if(!WS||WS.plan!=='trial')return 0;
  return Math.max(0,Math.round((new Date(WS.trial_ends)-new Date(saDate()))/86400000));
}
function applyTheme(){
  const t=(WS&&WS.theme)||{};
  const p=PRESETS[t.preset]||PRESETS.classic;
  const accent=t.accent||p.accent;
  document.documentElement.style.setProperty('--accent',accent);
  document.documentElement.style.setProperty('--accent-soft',tint(accent,12));
}
/* ============ DATA ============ */
async function loadWs(){
  const {data:mems,error}=await sb.from('bbe_members').select('*').eq('user_id',SESSION.user.id);
  if(error)throw error;
  MYWS=mems||[];
  if(!MYWS.length){WS=null;MEM=null;return;}
  const savedWs=localStorage.getItem('bbe_ws');
  MEM=MYWS.find(m=>m.workspace_id===savedWs)||MYWS[0];
  const [w,mm,b]=await Promise.all([
    sb.from('bbe_workspaces').select('*').eq('id',MEM.workspace_id).single(),
    sb.from('bbe_members').select('*').eq('workspace_id',MEM.workspace_id).order('created_at'),
    sb.from('bbe_boards').select('*').eq('workspace_id',MEM.workspace_id).order('created_at'),
  ]);
  if(w.error)throw w.error;
  WS=w.data; MEMBERS=mm.data||[]; BOARDS=b.data||[];
  localStorage.setItem('bbe_ws',WS.id);
  if(!BOARDS.find(x=>x.id===S.board))S.board=localStorage.getItem('bbe_board_'+WS.id);
  if(!BOARDS.find(x=>x.id===S.board))S.board=BOARDS[0]?BOARDS[0].id:null;
  applyTheme();
}
async function loadBoard(){

const tdDone=t=>t.note_id?!!(TDN[t.note_id]&&TDN[t.note_id].done):!!t.done;
async function loadToday(){
  if(!WS)return;
  const {data}=await sb.from('bbe_today').select('*').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).eq('for_date',saDate()).order('position');
  TD=data||[]; TDN={};TDC={};

  if(ids.length){
    const [{data:ns},{data:cs}]=await Promise.all([
      sb.from('bbe_notes').select('id,title,done,archived,due_date,warn_days,column_id,board_id').in('id',ids),
      sb.from('bbe_columns').select('id,name,color,board_id').eq('workspace_id',WS.id),
    ]);

async function ensureToday(){
  if(!WS)return;
  const today=saDate();
  const {data:ex}=await sb.from('bbe_today').select('id').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).eq('for_date',today).limit(1);
  if(ex&&ex.length){await loadToday();return;}
  const rows=[];let pos=0;
  const {data:prev}=await sb.from('bbe_today').select('*').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).lt('for_date',today).order('for_date',{ascending:false}).limit(40);
  const prevDate=prev&&prev.length?prev[0].for_date:null; const carried=new Set();
  if(prevDate){
    const pids=prev.filter(p=>p.for_date===prevDate&&!p.removed&&p.note_id).map(p=>p.note_id);
    let open={};
    if(pids.length){const {data:pn}=await sb.from('bbe_notes').select('id,done,archived').in('id',pids);(pn||[]).forEach(n=>open[n.id]=n);}
    for(const p of prev.filter(p=>p.for_date===prevDate&&!p.removed)){
      if(p.note_id){const n=open[p.note_id];if(n&&!n.done&&!n.archived){rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,note_id:p.note_id,reason:'carried over',position:pos++});carried.add(p.note_id);}}
      else if(!p.done&&p.text_line)rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,text_line:p.text_line,reason:'carried over',position:pos++});
    }
  }
  const {data:cand}=await sb.from('bbe_notes').select('id,done,archived,due_date,warn_days,assignee').eq('workspace_id',WS.id).eq('done',false).eq('archived',false).not('due_date','is',null);
  const t0=new Date(today+'T00:00:00Z').getTime();
  for(const n of (cand||[])){
    if(carried.has(n.id))continue;
    if(n.assignee&&n.assignee!==SESSION.user.id)continue;
    const days=Math.round((new Date(n.due_date+'T00:00:00Z').getTime()-t0)/86400000);
    if(days>(n.warn_days??7))continue;
    rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,note_id:n.id,reason:days<0?'overdue':'due soon',position:pos++});
  }
  if(rows.length){const {error}=await sb.from('bbe_today').insert(rows);if(error)console.error(error);}
  else await sb.from('bbe_today').insert({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,text_line:null,reason:'__init__',removed:true,position:0});
  await loadToday();
}

    const days=Math.round((new Date(n.due_date+'T00:00:00Z')-new Date(saDate()+'T00:00:00Z'))/86400000);
    if(days<0)return `overdue ${-days}d`; if(days===0)return 'due today';

}

          <h4>${esc(n.title)}</h4>

          <div class="meta">
            <button class="chk ${n.done?'on':''}" onclick="event.stopPropagation();toggleDone('${n.id}')">${n.done?'✓':''}</button>

      ${archived.map(n=>`<div style="display:flex;gap:8px;align-items:center;padding:6px 2px;border-bottom:1px solid var(--line)">
        <span style="flex:1;font-size:12.5px;text-decoration:line-through;opacity:.6">${esc(n.title)}</span>
        <button class="btn ghost sm" onclick="unarchive('${n.id}')">${ic('undo',11)} Restore</button></div>`).join('')}</details>`:''}
  </div>`;
}
function dueChip(n){
  if(!n.due_date)return '';
  const label=new Date(n.due_date+'T12:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
  const days=Math.round((new Date(n.due_date+'T00:00:00Z')-new Date(saDate()+'T00:00:00Z'))/86400000);
  if(n.done)return `<span class="due" style="background:rgba(0,0,0,.06);color:var(--muted)">${ic('calendar',10)} ${label}</span>`;
  if(days<0)return `<span class="due" style="background:var(--danger);color:#fff">${ic('alert',10)} ${label} · ${-days}d over</span>`;
  if(days<=(n.warn_days??7))return `<span class="due" style="background:#FAEEDA;color:#854F0B">${ic('calendar',10)} ${label} · ${days===0?'today':days+'d'}</span>`;
  return `<span class="due" style="background:rgba(0,0,0,.06);color:var(--muted)">${ic('calendar',10)} ${label}</span>`;
}

async function saveNote(id){

async function sendInvite(){
  const name=$('im-name').value.trim(),email=$('im-email').value.trim(),pw=$('im-pw').value;
  if(!name||!email||pw.length<8){toast('Name, email and an 8-character password');return;}
  const b=$('im-go');b.disabled=true;b.textContent='Adding…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-invite`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},

    const j=await res.json();

    closeModal();await loadWs();render();
    toast(j.emailed?`${name.split(' ')[0]} added — details emailed`:`${name.split(' ')[0]} added — share the password yourself`);
  }catch(e){fail(e);b.disabled=false;b.textContent='Add member';}

async function removeMember(uid){
  const m=MEMBERS.find(x=>x.user_id===uid);
  if(!confirm(`Remove ${m.name} from ${WS.name}? Their tasks become unassigned.`))return;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-invite`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({action:'remove',workspace_id:WS.id,user_id:uid})});
    const j=await res.json(); if(!res.ok||j.error)throw new Error(j.error||'Could not remove');
    await loadWs();render();toast(`${m.name.split(' ')[0]} removed`);
  }catch(e){fail(e);}
}
/* ============ SETTINGS ============ */
function settingsView(){
  const t=(WS.theme)||{};
  return `<div class="view-title"><h2>${ic('gear',18)} Settings</h2><span class="sub">${esc(WS.name)}</span></div>
  <div class="settings-grid">
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:4px">Workspace</h3>
      <label>Name</label><input id="st-name" value="${esc(WS.name)}" ${canManage()?'':'disabled'}>
      <label>Plan</label>
      <div style="display:flex;align-items:center;gap:9px">
        <span class="pill" style="background:${planEff()==='pro'?'var(--ok)':'var(--muted)'}">${WS.plan==='trial'?`Trial · ${trialDaysLeft()} days left`:WS.plan==='pro'?'Pro':'Free'}</span>
        ${planEff()==='free'?'<span style="font-size:12px;color:var(--muted)">1 board · 3 members · powered by Brand Expert</span>':''}
      </div>
      ${canManage()?`<div class="row" style="justify-content:flex-start"><button class="btn accent sm" onclick="saveWsName()">Save name</button></div>`:''}
      ${MYWS.length>1?`<label>Switch workspace</label><select onchange="localStorage.setItem('bbe_ws',this.value);refresh()">${MYWS.map(m=>`<option value="${m.workspace_id}" ${m.workspace_id===WS.id?'selected':''}>${m.workspace_id===WS.id?esc(WS.name):'Workspace '+m.workspace_id.slice(0,6)}</option>`).join('')}</select>`:''}
    </div>
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:4px">Theme</h3>
      <label>Preset</label>
      <div class="swatches">${Object.entries(PRESETS).map(([k,p])=>`<button type="button" title="${k}" style="background:${p.accent}" class="${(t.preset||'classic')===k?'sel':''}" onclick="setTheme('${k}')"></button>`).join('')}</div>
      <p style="font-size:12px;color:var(--muted);margin-top:12px">The accent colours your buttons, highlights and progress bars. Category colours are set per category on each board.</p>
    </div>
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:4px">You</h3>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0">${avatar(MEM)}<div><b style="font-size:14px">${esc(MEM.name)}</b><span style="display:block;font-size:11.5px;color:var(--muted)">${esc(MEM.email)} · ${MEM.role}</span></div></div>
      <div class="row" style="justify-content:flex-start">
        <button class="btn ghost sm" onclick="changePw()">Change password</button>
        <button class="btn ghost sm" onclick="signOut()">Sign out</button>
      </div>
    </div>
  </div>`;
}
async function saveWsName(){
  const name=$('st-name').value.trim(); if(!name)return;
  try{await sb.from('bbe_workspaces').update({name}).eq('id',WS.id);await loadWs();render();toast('Saved');}catch(e){fail(e);}
}
async function setTheme(preset){
  if(!canManage()){toast('Only the owner or an admin can change the theme');return;}
  try{const theme={...(WS.theme||{}),preset,accent:PRESETS[preset].accent};
  await sb.from('bbe_workspaces').update({theme}).eq('id',WS.id);WS.theme=theme;applyTheme();render();}catch(e){fail(e);}
}
/* ============ CONTENT (social calendar) ============ */
const PLAT={instagram:['Instagram','#C4356B'],facebook:['Facebook','#185FA5'],youtube:['YouTube','#C6453D'],tiktok:['TikTok','#23241f'],linkedin:['LinkedIn','#0F6E8E'],other:['Other','#8a887e']};
let _calMonth=null;
function contentView(){
  const b=BOARDS.find(x=>x.id===S.board);
  if(!b)return `<div class="empty" style="text-align:center;padding:60px 20px">Choose a board first.<br><br><button class="btn accent" onclick="go('boards')">Boards</button></div>`;
  if(!_calMonth)_calMonth=saDate().slice(0,7);
  const [Y,M]=_calMonth.split('-').map(Number);
  const first=new Date(Date.UTC(Y,M-1,1));
  const startDow=(first.getUTCDay()+6)%7;
  const daysIn=new Date(Date.UTC(Y,M,0)).getUTCDate();
  const today=saDate();
  const posts=cur.posts||[];
  const byDate={}; posts.forEach(p=>{(byDate[p.post_date]=byDate[p.post_date]||[]).push(p);});
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div></div>';
  for(let d=1;d<=daysIn;d++){
    const ds=`${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dp=byDate[ds]||[];
    cells+=`<div onclick="postModal(null,'${ds}')" style="min-height:74px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:5px 6px;cursor:pointer;${ds===today?'outline:2px solid var(--accent);outline-offset:-2px;':''}">
      <div style="font-size:10.5px;font-weight:700;color:var(--muted)">${d}</div>
      ${dp.slice(0,3).map(p=>`<div onclick="event.stopPropagation();postModal('${p.id}')" title="${esc(p.caption.slice(0,80))}" style="font-size:9.5px;font-weight:700;color:#fff;background:${PLAT[p.platform][1]};border-radius:5px;padding:2px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${p.status==='posted'?'opacity:.45;':''}">${p.status==='approved'?'✓ ':''}${PLAT[p.platform][0]}</div>`).join('')}
      ${dp.length>3?`<div style="font-size:9px;color:var(--muted);font-weight:700;margin-top:2px">+${dp.length-3} more</div>`:''}
    </div>`;
  }
  const monthLbl=first.toLocaleDateString('en-ZA',{month:'long',year:'numeric',timeZone:'UTC'});
  const upcoming=posts.filter(p=>p.post_date>=today&&p.status!=='posted').slice(0,8);
  return `<div class="view-title"><h2>${ic('calendar',18)} Content</h2><span class="sub">${esc(b.name)} · plan, draft and post in one place</span>
    <span style="flex:1"></span><button class="btn accent sm" onclick="postModal()">${ic('plus',12)} New post</button></div>
  <div class="card" style="padding:14px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <button class="btn ghost sm" onclick="calShift(-1)">‹</button>
      <b style="flex:1;text-align:center;font-size:14.5px">${monthLbl}</b>
      <button class="btn ghost sm" onclick="calShift(1)">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;font-size:10px;font-weight:800;color:var(--muted);text-align:center;margin-bottom:5px">
      <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${cells}</div>
  </div>
  <div style="margin-top:16px">
    <div style="font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;margin-bottom:8px">COMING UP</div>
    ${upcoming.map(p=>`<div class="task-row" style="--c:${PLAT[p.platform][1]}" onclick="postModal('${p.id}')">
      <span class="pill" style="background:${PLAT[p.platform][1]};flex:none">${PLAT[p.platform][0]}</span>
      <div class="t"><b>${esc(p.caption.split('\\n')[0].slice(0,70)||'(no caption yet)')}</b>
        <span>${p.post_date} · ${(p.post_time||'').slice(0,5)} · ${p.status}</span></div>
      <button class="btn ghost sm" onclick="event.stopPropagation();copyCaption('${p.id}')">Copy</button>
    </div>`).join('')||'<div class="empty">Nothing scheduled — click a day on the calendar to plan a post.</div>'}
  </div>`;
}
function calShift(n){
  const [Y,M]=_calMonth.split('-').map(Number);
  const d=new Date(Date.UTC(Y,M-1+n,1));
  _calMonth=d.toISOString().slice(0,7); render();
}
function postModal(id,dateStr){
  const p=id?(cur.posts||[]).find(x=>x.id===id):null;
  openModal(`<h3>${p?'Edit post':'New post'}</h3>
    <label>Platform</label>
    <select id="po-plat">${Object.entries(PLAT).map(([k,[n]])=>`<option value="${k}" ${p&&p.platform===k?'selected':''}>${n}</option>`).join('')}</select>
    <label>Caption ${planEff()==='pro'?`<button type="button" style="float:right;color:var(--accent);font-weight:700;font-size:11px;text-transform:none;letter-spacing:0" onclick="draftAI()">✦ Draft with AI</button>`:''}</label>
    <textarea id="po-cap" rows="6" placeholder="Write it yourself — or tell the AI what the post is about and press ✦">${p?esc(p.caption):''}</textarea>
    <label>Media note (what image/video goes with it)</label>
    <input id="po-media" value="${p?esc(p.media_note||''):''}" placeholder="e.g. medal design photo, 1080x1080">
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label>Date</label><input type="date" id="po-date" value="${p?p.post_date:(dateStr||saDate())}"></div>
      <div style="width:110px"><label>Time</label><input type="time" id="po-time" value="${p?(p.post_time||'09:00').slice(0,5):'09:00'}"></div>
    </div>
    <label>Status</label>
    <select id="po-status">
      <option value="draft" ${!p||p.status==='draft'?'selected':''}>Draft</option>
      <option value="approved" ${p&&p.status==='approved'?'selected':''}>Approved — ready to post</option>
      <option value="posted" ${p&&p.status==='posted'?'selected':''}>Posted</option>
    </select>
    <div class="row">
      ${p?`<button class="btn ghost" style="margin-right:auto;color:var(--danger)" onclick="delPost('${p.id}')">${ic('trash',13)}</button>`:''}
      ${p?`<button class="btn ghost" onclick="copyCaption('${p.id}')">Copy caption</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn accent" onclick="savePost(${p?`'${p.id}'`:'null'})">${p?'Save':'Add to calendar'}</button>
    </div>`);
}
async function draftAI(){
  const brief=$('po-cap').value.trim()||prompt('What is this post about? One or two lines:');
  if(!brief)return;
  const cap=$('po-cap'); cap.value='✦ Drafting…'; cap.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-draft`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({workspace_id:WS.id,board_id:S.board,platform:$('po-plat').value,brief})});
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Drafting failed');
    cap.value=j.text;
  }catch(e){cap.value=brief;fail(e);}
  cap.disabled=false;
}
async function savePost(id){
  const row={workspace_id:WS.id,board_id:S.board,platform:$('po-plat').value,caption:$('po-cap').value.trim(),
    media_note:$('po-media').value.trim(),post_date:$('po-date').value,post_time:$('po-time').value||'09:00',
    status:$('po-status').value,created_by:SESSION.user.id};
  if(!row.post_date){toast('Pick a date');return;}
  try{
    if(id){const {error}=await sb.from('bbe_posts').update(row).eq('id',id);if(error)throw error;}
    else{const {error}=await sb.from('bbe_posts').insert(row);if(error)throw error;}
    closeModal();await loadBoard();render();toast(id?'Post updated':'On the calendar');
  }catch(e){fail(e);}
}
async function delPost(id){
  const p=(cur.posts||[]).find(x=>x.id===id);
  try{await sb.from('bbe_posts').delete().eq('id',id);const copy={...p};cur.posts=cur.posts.filter(x=>x.id!==id);closeModal();render();
  toast('Post removed','Undo',async()=>{await sb.from('bbe_posts').insert(copy);await loadBoard();render();});}catch(e){fail(e);}
}
async function copyCaption(id){
  const p=(cur.posts||[]).find(x=>x.id===id); if(!p)return;
  try{await navigator.clipboard.writeText(p.caption);toast('Caption copied — paste it straight into the app');}catch(_){toast('Could not copy');}
}

/* ============ MODAL / REALTIME / BOOT ============ */
function openModal(html){$('modal').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){$('overlay').classList.remove('open');}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
let rt=null,rtT=null;
function subscribeRealtime(){
  if(rt)sb.removeChannel(rt);
  rt=sb.channel('bbe-changes').on('postgres_changes',{event:'*',schema:'public'},p=>{
    if(!p.table||!p.table.startsWith('bbe_'))return;
    clearTimeout(rtT);
    rtT=setTimeout(()=>{if($('overlay').classList.contains('open'))return;refresh();},600);
  }).subscribe();
}
async function boot(){
  try{
    await loadWs();
    if(WS){await loadBoard();await ensureToday();subscribeRealtime();}
    render();
  }catch(e){fail(e);render();}
}
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  SESSION=session;
  if(SESSION)await boot(); else render();
  sb.auth.onAuthStateChange((ev,s)=>{
    SESSION=s;
    if(ev==='PASSWORD_RECOVERY'){openModal(`<h3>Set a new password</h3>
      <label>New password (min 8)</label><input id="rp-new" type="password">
      <div class="row"><button class="btn accent" onclick="doResetPw()">Save</button></div>`);return;}
    if(!s){WS=null;render();}
  });
})();
async function doResetPw(){
  const pw=$('rp-new').value; if(pw.length<8){toast('Minimum 8 characters');return;}
  try{const {error}=await sb.auth.updateUser({password:pw});if(error)throw error;
  closeModal();await boot();toast('🔑 Password updated');}catch(e){fail(e);}
}
</script>
