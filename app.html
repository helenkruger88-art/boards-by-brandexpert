async function checkout(kind){
  try{
    toast('Opening secure payment…');
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-checkout`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({workspace_id:WS.id,kind})});
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Could not start checkout');
    const f=document.createElement('form'); f.method='POST'; f.action=j.action;
    for(const [k,v] of j.fields){const i=document.createElement('input');i.type='hidden';i.name=k;i.value=v;f.appendChild(i);}
    document.body.appendChild(f); f.submit();
  }catch(e){fail(e);}
}
function billingReturnCheck(){
  const q=new URLSearchParams(location.search);
  if(q.get('billing')==='success'){history.replaceState(null,'',location.pathname);
    setTimeout(()=>toast('💳 Payment received — your plan updates within a minute'),800);}
  if(q.get('billing')==='cancelled'){history.replaceState(null,'',location.pathname);
    setTimeout(()=>toast('Payment cancelled — nothing was charged'),800);}
  if(q.get('connected')){const p=q.get('connected');history.replaceState(null,'',location.pathname);
    setTimeout(()=>{toast('🎉 '+p.charAt(0).toUpperCase()+p.slice(1)+' connected — approved posts can now publish themselves');if(typeof go==='function')go('content');},900);}
}

/* ============ AI ASSIST (notes chat + day brief) ============ */
let _aiLog=[],_aiNote=null;
async function aiApi(body){
  const {data:{session}}=await sb.auth.getSession();
  const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-ask`,{method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
    body:JSON.stringify({workspace_id:WS.id,...body})});
  return await res.json();
}
function aiAssist(noteId){
  const n=cur.notes.find(x=>x.id===noteId); if(!n)return;
  _aiLog=[];_aiNote=noteId;
  openModal(`<h3>✦ Assist · <span style="font-weight:500;font-size:14px">${esc(n.title)}</span></h3>
    <div id="ai-r" style="display:none;max-height:44vh;overflow-y:auto;margin:8px 0"></div>
    <label id="ai-lbl">Your brief — the AI knows this task, its board and your team. Keep chatting after each answer.</label>
    <textarea id="ai-q" rows="3" placeholder="e.g. Draft the supplier follow-up email… / Break this into steps… / Research options for…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend();}"></textarea>
    <div class="row">
      <button class="btn ghost" onclick="closeModal()">Close</button>
      <button class="btn ghost" id="ai-save" style="display:none" onclick="aiSave()">Save to task</button>
      <button class="btn accent" id="ai-go" onclick="aiSend()">✦ Ask</button>
    </div>`);
  setTimeout(()=>{const e=$('ai-q');if(e)e.focus();},60);
}
function aiRender(thinking){
  const r=$('ai-r'); if(!r)return;
  r.style.display=(_aiLog.length||thinking)?'block':'none';
  r.innerHTML=_aiLog.map(m=>m.role==='user'
    ?`<div style="background:var(--bg);border-radius:11px 11px 3px 11px;padding:9px 12px;margin:8px 0 8px 40px;font-size:13px;white-space:pre-wrap">${esc(m.content)}</div>`
    :`<div style="background:var(--accent-soft);border-radius:11px 11px 11px 3px;padding:10px 13px;margin:8px 40px 8px 0;font-size:13px;line-height:1.6;white-space:pre-wrap">${esc(m.content)}</div>`).join('')
    +(thinking?'<div style="color:var(--muted);font-size:12.5px;padding:6px 2px">✦ Thinking…</div>':'');
  r.scrollTop=r.scrollHeight;
}
async function aiSend(){
  const q=$('ai-q').value.trim(); if(!q){toast('Type a brief first');return;}
  const history=_aiLog.map(m=>({role:m.role,content:m.content}));
  _aiLog.push({role:'user',content:q}); $('ai-q').value=''; aiRender(true);
  const b=$('ai-go'); b.disabled=true;
  try{
    const j=await aiApi({mode:'note',note_id:_aiNote,brief:q,history});
    if(j.error==='OUT_OF_CREDITS'){_aiLog.pop();$('ai-q').value=q;aiRender(false);toast(j.message);b.disabled=false;return;}
    if(j.error)throw new Error(j.error);
    _aiLog.push({role:'assistant',content:j.text});
    if(typeof j.credits_left==='number')_credits=j.credits_left;
    $('ai-save').style.display='';
    const lbl=$('ai-lbl'); if(lbl)lbl.textContent=`Ask a follow-up — it remembers this conversation · ${j.credits_left} credits left`;
    b.textContent='✦ Send';
  }catch(e){_aiLog.push({role:'assistant',content:'⚠ '+(e.message||e)});}
  aiRender(false); b.disabled=false;
  const qa=$('ai-q'); if(qa)qa.focus();
}
async function aiSave(){
  const last=[..._aiLog].reverse().find(m=>m.role==='assistant'); if(!last)return;
  const n=cur.notes.find(x=>x.id===_aiNote); if(!n)return;
  const desc=((n.description||'')+'\n\n✦ AI:\n'+last.content).trim();
  try{await sb.from('bbe_notes').update({description:desc}).eq('id',_aiNote);n.description=desc;
  closeModal();render();toast('Saved to the task');}catch(e){fail(e);}
}
/* day brief on Today */
async function dayBrief(force){
  const key='bbe_brief_'+SESSION.user.id.slice(0,8)+'_'+saDate();
  const box=$('brief-box'); if(!box)return;
  const cached=localStorage.getItem(key);
  if(cached&&!force){box.textContent=cached;return;}
  box.textContent='✦ Reading your boards… (1 credit)';
  try{
    const j=await aiApi({mode:'brief'});
    if(j.error==='OUT_OF_CREDITS'){box.textContent=j.message;return;}
    if(j.error){box.textContent='⚠ '+(j.message||j.error);return;}
    localStorage.setItem(key,j.text);
    box.textContent=j.text;
    if(typeof j.credits_left==='number')_credits=j.credits_left;
  }catch(e){box.textContent='⚠ '+(e.message||e);}
}

/* ---- Import brief (AI → tasks + content drafts) ---- */
let _ibData=null,_ibBrief='',_ibPlat='general';
const IB_PLATS=['instagram','facebook','threads','tiktok','linkedin','youtube'];
async function importBriefApi(body){
  const {data:{session}}=await sb.auth.getSession();
  const r=await fetch(`${SUPABASE_URL}/functions/v1/bbe-import-brief`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,Authorization:'Bearer '+session.access_token},body:JSON.stringify({workspace_id:WS.id,board_id:S.board,...body})});
  return await r.json();
}
function ibFormHtml(){
  return `<h3>Import a brief</h3>
    <div style="font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5">Paste a marketing brief and I'll turn it into tasks and ready-to-schedule content on this board. Uses AI credits.</div>
    <label>Attach brief files (txt, md, csv, docx, pdf) — or paste below</label>
    <input type="file" id="ib-files" multiple accept=".txt,.md,.markdown,.csv,.json,.html,.htm,.docx,.pdf" onchange="ibFilesPicked(event)">
    <div id="ib-files-note" style="font-size:11.5px;color:var(--muted);margin:4px 0 0 2px"></div>
    <label>Brief</label>
    <textarea id="ib-brief" rows="7" placeholder="Paste your brief here…">${esc(_ibBrief)}</textarea>
    <label>Default platform (when the brief doesn't say)</label>
    <select id="ib-plat"><option value="general" ${_ibPlat==='general'?'selected':''}>General — no channel yet</option>${IB_PLATS.map(p=>`<option value="${p}" ${p===_ibPlat?'selected':''}>${(typeof PLAT!=='undefined'&&PLAT[p])?PLAT[p][0]:p}</option>`).join('')}</select>
    <div class="row">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn accent" id="ib-go" onclick="importBriefGenerate()">✦ Generate</button>
    </div>`;
}
function ibShowForm(){
  openModal(ibFormHtml());
  setTimeout(()=>{const e=$('ib-brief');if(e)e.focus();},60);
}
function loadScriptOnce(src){
  return new Promise((resolve,reject)=>{
    const done=document.querySelector(`script[data-once="${src}"]`);
    if(done&&done.dataset.loaded==='1'){resolve();return;}
    if(done){done.addEventListener('load',()=>resolve());done.addEventListener('error',()=>reject(new Error('load failed')));return;}
    const s=document.createElement('script');
    s.src=src; s.async=true; s.setAttribute('data-once',src);
    s.onload=()=>{s.dataset.loaded='1';resolve();};
    s.onerror=()=>reject(new Error('load failed'));
    document.head.appendChild(s);
  });
}
async function ibReadFileText(file){
  const name=(file.name||'').toLowerCase();
  if(/\.(txt|md|markdown|csv|json|html|htm)$/.test(name))return await file.text();
  if(name.endsWith('.docx')){
    if(typeof window.mammoth==='undefined')await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
    const {value}=await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
    return value||'';
  }
  if(name.endsWith('.pdf')){
    if(typeof window.pdfjsLib==='undefined'){
      await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const doc=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    const pages=[];
    for(let i=1;i<=doc.numPages;i++){
      const pg=await doc.getPage(i);
      const tc=await pg.getTextContent();
      pages.push(tc.items.map(it=>it.str).join(' '));
    }
    return pages.join('\n\n');
  }
  return await file.text();
}
async function ibFilesPicked(ev){
  const files=Array.from((ev.target&&ev.target.files)||[]);
  if(!files.length)return;
  const note=$('ib-files-note'); if(note)note.textContent='Reading files…';
  const ta=$('ib-brief');
  let cur=ta?ta.value:_ibBrief;
  let ok=0;
  for(const f of files){
    try{
      let text=await ibReadFileText(f);
      text=(text||'').trim();
      if(!text)continue;
      cur=(cur?cur:'')+`\n\n----- ${f.name} -----\n`+text;
      if(cur.length>40000)cur=cur.slice(0,40000);
      if(ta)ta.value=cur; _ibBrief=cur;
      ok++;
    }catch(e){toast(`Couldn't read ${f.name} — paste its text instead`);}
  }
  if(ta){ta.value=cur;} _ibBrief=cur;
  if(note)note.textContent='';
  if(ev.target)ev.target.value='';
  if(ok)toast(`Added text from ${ok} file(s)`);
}
function openImportBrief(){
  if(!S.board){toast('Open a board first');return;}
  _ibData=null; ibShowForm();
}
async function importBriefGenerate(){
  const brief=($('ib-brief')?$('ib-brief').value:'').trim();
  if(!brief){toast('Paste a brief first');return;}
  _ibBrief=brief; _ibPlat=$('ib-plat')?$('ib-plat').value:_ibPlat;
  openModal(`<h3>Import a brief</h3>
    <div class="empty" style="text-align:center;padding:38px 10px">✦ Reading your brief… this takes a few seconds</div>`);
  try{
    const j=await importBriefApi({action:'preview',brief,platform_default:_ibPlat});
    if(j&&j.error){toast(j.message||j.error);ibShowForm();return;}
    _ibData={summary:(j&&j.summary)||'',tasks:(j&&j.tasks)||[],posts:(j&&j.posts)||[],plan:(j&&j.plan)||null};
    ibReview();
  }catch(e){fail(e);ibShowForm();}
}
function ibReview(){
  const d=_ibData; if(!d)return;
  const rowS='display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:7px';
  const cbS='width:16px;height:16px;flex:none;accent-color:var(--accent);cursor:pointer';
  const empty=!d.tasks.length&&!d.posts.length&&!(d.plan&&d.plan.nodes&&d.plan.nodes.length);
  openModal(`<h3>Import a brief</h3>
    ${d.summary?`<div style="font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5">${esc(d.summary)}</div>`:''}
    ${empty?'<div class="empty" style="text-align:center;padding:30px 10px">Nothing could be extracted — try a more detailed brief.</div>':''}
    ${d.tasks.length?`<label>Tasks (${d.tasks.length})</label>
      ${d.tasks.map((t,i)=>`<div style="${rowS}">
        <input type="checkbox" id="ib-t-${i}" checked style="${cbS}">
        <span style="flex:1;min-width:0;font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title||'')}</span>
        ${t.due_in_days>0?`<span style="flex:none;font-size:11px;font-weight:600;color:var(--muted)">· due in ${t.due_in_days}d</span>`:''}
      </div>`).join('')}`:''}
    ${d.posts.length?`<label>Content drafts (${d.posts.length})</label>
      ${d.posts.map((p,i)=>{const pm=(typeof PLAT!=='undefined'&&PLAT[p.platform])?PLAT[p.platform]:null;
        return `<div style="${rowS}">
        <input type="checkbox" id="ib-p-${i}" checked style="${cbS}">
        <span class="pill" style="flex:none;background:${pm?pm[1]:'var(--muted)'}">${esc(pm?pm[0]:(p.platform||'?'))}</span>
        <span style="flex:1;min-width:0;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(((p.caption||'').split('\n')[0]).slice(0,80))}</span>
      </div>`;}).join('')}`:''}
    ${(d.plan&&d.plan.nodes&&d.plan.nodes.length)?`<label>Plan canvas</label>
      <div style="${rowS}">
        <input type="checkbox" id="ib-plan" style="${cbS}">
        <span style="flex:1;min-width:0;font-size:13.5px;font-weight:600">Build a Plan canvas — ${d.plan.nodes.length} steps</span>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin:-2px 0 4px 2px">A visual left-to-right map of the campaign on the board's Plan tab.</div>`:''}
    <div class="row">
      <button class="btn ghost" onclick="ibShowForm()">Back</button>
      ${empty?'':`<button class="btn accent" id="ib-add" onclick="importBriefConfirm()">Add to board</button>`}
    </div>`);
}
async function importBriefConfirm(){
  const d=_ibData; if(!d){toast('Nothing to add');return;}
  const tasks=d.tasks.filter((t,i)=>{const c=$('ib-t-'+i);return c&&c.checked;});
  const posts=d.posts.filter((p,i)=>{const c=$('ib-p-'+i);return c&&c.checked;});
  const wantPlan=!!(document.getElementById('ib-plan')&&document.getElementById('ib-plan').checked);
  if(!tasks.length&&!posts.length&&!wantPlan){toast('Tick at least one item to add');return;}
  const b=$('ib-add'); if(b){b.disabled=true;b.textContent='Adding…';}
  try{
    const j=await importBriefApi({action:'import',tasks,posts,want_tasks:tasks.length>0,want_posts:posts.length>0,want_plan:wantPlan,plan:wantPlan?_ibData.plan:undefined,platform_default:_ibPlat});
    if(j&&j.error){toast(j.message||j.error);if(b){b.disabled=false;b.textContent='Add to board';}return;}
    closeModal(); _ibData=null; _ibBrief='';
    toast(`Added ${(j&&j.tasks_added)||0} tasks, ${(j&&j.posts_added)||0} drafts${(j&&j.plan_added)?`, ${j.plan_added}-step plan`:''}`);
    await loadBoard(); render();
  }catch(e){fail(e);if(b){b.disabled=false;b.textContent='Add to board';}}
}

/* ============ MODAL / REALTIME / BOOT ============ */
function openModal(html){$('modal').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){$('overlay').classList.remove('open');}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
let rt=null,rtT=null;
function subscribeRealtime(){
  if(rt)sb.removeChannel(rt);
  rt=sb.channel('bbe-changes').on('postgres_changes',{event:'*',schema:'public'},p=>{
    if(!p.table||!p.table.startsWith('bbe_'))return;
    clearTimeout(rtT);
    rtT=setTimeout(()=>{if($('overlay').classList.contains('open'))return;refresh();},600);
  }).subscribe();
}
async function boot(){
  try{
    await loadWs();
    if(WS){await loadBoard();await ensureToday();subscribeRealtime();
      if(WS.plan!=='basic')loadCredits().then(render);}
    render();
  }catch(e){fail(e);render();}
}
let _linkToken=null;
async function authLinkCheck(){
  const q=new URLSearchParams(location.search);
  const confirm=q.get('confirm'), pwreset=q.get('pwreset');
  const fbc=q.get('fbconnected');
  if(fbc){history.replaceState({},'',location.pathname);setTimeout(()=>toast(fbc==='err'?'Facebook connection failed — try again':'✅ Facebook Page linked — comments & messages will now land in your Inbox'),800);}
  if(!confirm&&!pwreset)return false;
  history.replaceState({},'',location.pathname);
  // The token is only consumed when the person clicks — email security scanners
  // that pre-open links can't burn it.
  _linkToken=confirm||pwreset;
  const app=$('app');
  if(pwreset){
    app.innerHTML=`<div class="auth"><div class="auth-card">
      <h3>Set a new password</h3>
      <div class="auth-err" id="a-err"></div>
      <label>New password (min 8)</label>${pwField('rp-new','new-password',null)}
      <button class="btn accent" style="width:100%;justify-content:center;padding:12px;margin-top:18px" id="rp-go" onclick="doLinkReset()">Save my new password</button>
      <div style="text-align:center;font-size:12px;margin-top:14px;color:var(--muted)">Link expired? <button style="color:var(--accent);font-weight:700" onclick="location.href=location.pathname">Back to sign in</button> and use "Forgot password?" — the newest email is the one that works.</div>
    </div></div>`;
  }else{
    app.innerHTML=`<div class="auth"><div class="auth-card" style="text-align:center">
      <h3>Confirm your email</h3>
      <div class="auth-err" id="a-err"></div>
      <p style="font-size:13.5px;color:var(--muted);margin:10px 0 18px">One click and you're in.</p>
      <button class="btn accent" style="width:100%;justify-content:center;padding:12px" id="cf-go" onclick="doLinkConfirm()">Confirm &amp; open my workspace</button>
    </div></div>`;
  }
  return true;
}
async function doLinkReset(){
  const pw=$('rp-new').value; if(pw.length<8){authErr('Minimum 8 characters.');return;}
  const b=$('rp-go');b.disabled=true;b.textContent='Saving…';
  try{
    const {data,error}=await sb.auth.verifyOtp({type:'recovery',token_hash:_linkToken});
    if(error)throw new Error('That link has expired or was already used — go back to sign in and request a fresh one (only the newest email works).');
    SESSION=data.session;
    const {error:e2}=await sb.auth.updateUser({password:pw});
    if(e2)throw e2;
    await boot(); toast('🔑 Password updated — welcome back');
  }catch(e){authErr(e.message||String(e));b.disabled=false;b.textContent='Save my new password';}
}
async function doLinkConfirm(){
  const b=$('cf-go');b.disabled=true;b.textContent='Confirming…';
  try{
    const {data,error}=await sb.auth.verifyOtp({type:'magiclink',token_hash:_linkToken});
    if(error)throw new Error('That link has expired or was already used — sign in and press "Resend the email" for a fresh one.');
    SESSION=data.session; await boot(); toast('✅ Email confirmed — welcome!');
  }catch(e){authErr(e.message||String(e));b.disabled=false;b.textContent='Confirm & open my workspace';}
}
(async()=>{
  if(await authLinkCheck())return;
  const {data:{session}}=await sb.auth.getSession();
  SESSION=session;
  billingReturnCheck();
  if(SESSION)await boot(); else render();
  sb.auth.onAuthStateChange((ev,s)=>{
    SESSION=s;
    if(ev==='PASSWORD_RECOVERY'){openModal(`<h3>Set a new password</h3>
      <label>New password (min 8)</label>${pwField('rp-new','new-password',null)}
      <div class="row"><button class="btn accent" onclick="doResetPw()">Save</button></div>`);return;}
    if(!s){WS=null;render();}
  });
})();
async function doResetPw(){
  const pw=$('rp-new').value; if(pw.length<8){toast('Minimum 8 characters');return;}
  try{const {error}=await sb.auth.updateUser({password:pw});if(error)throw error;
  closeModal();await boot();toast('🔑 Password updated');}catch(e){fail(e);}
}
