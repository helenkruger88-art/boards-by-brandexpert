<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Boards by Brand Expert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --accent:#C75B12; --accent-soft:#FBF1E8;
  --bg:#F7F6F3; --card:#FFFFFF; --ink:#23241f; --muted:#8a887e;
  --line:#E7E5DE; --line-strong:#D6D3C9;
  --ok:#1D9E75; --danger:#C6453D; --warn:#BA7517;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;font-size:13.5px}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;width:100%;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 5px}
h1,h2,h3{font-weight:700;letter-spacing:-.01em}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-weight:600;font-size:13.5px;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn.accent{background:var(--accent)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:var(--bg);opacity:1}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line-strong);border-radius:16px;padding:6px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:12px;padding:3px 10px;font-size:11.5px;font-weight:700;color:#fff;background:var(--accent)}
.socic{position:relative;display:inline-flex;line-height:0}
.socic .x{position:absolute;top:-5px;right:-5px;width:14px;height:14px;line-height:13px;text-align:center;border-radius:50%;background:#c0392b;color:#fff;font-size:9px;font-weight:800;cursor:pointer;display:none;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.socic:hover .x{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.avatar{width:30px;height:30px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top))}
.wordmark{font-weight:800;font-size:16px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px;cursor:pointer}
.wordmark em{font-style:normal;color:var(--accent)}
.wordmark small{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.04em}
.tabs{display:none;gap:2px;margin-left:14px}
.tabs button{padding:8px 13px;border-radius:9px;font-weight:600;font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.tabs button.active{background:var(--accent-soft);color:var(--accent)}
.tabs button:hover{color:var(--ink)}
main{padding:16px;max-width:1280px;margin:0 auto;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(8px + env(safe-area-inset-bottom))}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:10px;position:relative}
.bottomnav button.active{color:var(--accent)}
.bottomnav .bdot{position:absolute;top:0;right:4px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px}
.bottomnav{overflow-x:auto}
.bottomnav button{flex:none;min-width:54px}
.appshell{display:flex;min-height:100vh}
.sidebar{display:none}
.contentarea{flex:1;min-width:0;max-width:100%}
.sb-brand{font-weight:800;font-size:15px;letter-spacing:-.01em;padding:4px 10px 12px;cursor:pointer}
.sb-brand small{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.06em}
.sb-back{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--accent);padding:2px 10px 6px;width:100%;text-align:left}
.sb-bhead{display:flex;align-items:center;gap:6px;padding:0 6px 10px}
.sb-sw{width:11px;height:11px;border-radius:4px;flex:none}
.sb-switch{border:none;background:transparent;font-weight:800;font-size:14.5px;padding:2px 2px;width:auto;max-width:148px;cursor:pointer;color:var(--ink)}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--muted);text-align:left}
.sb-item:hover{background:#F1EFEA;color:var(--ink)}
.sb-item.on{background:var(--accent-soft);color:var(--accent)}
.sb-item .sb-b{margin-left:auto;background:var(--accent);color:#fff;border-radius:9px;padding:0 6px;font-size:10px;font-weight:800}
.sb-sec{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:14px 10px 5px}
.sb-dot{width:10px;height:10px;border-radius:3px;flex:none}
.sb-foot{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding-top:12px;border-top:1px solid var(--line);margin-top:16px}
.sb-cred{align-self:flex-start;background:var(--accent);color:#fff;border-radius:12px;padding:5px 12px;font-size:12px;font-weight:800}
.tb-back{padding:2px 8px;color:var(--ink);font-size:20px;font-weight:700}
.view-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 0 14px}
.view-title h2{font-size:20px}
.view-title .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.boards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:14px}
.board-card{position:relative;background:#fff;border:1px solid var(--line);border-top:4px solid var(--accent);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.board-del{position:absolute;top:8px;right:8px;opacity:0;color:var(--muted);padding:4px;border-radius:7px;line-height:0;transition:opacity .12s}
.board-card:hover .board-del{opacity:.6}
.board-del:hover{opacity:1;color:var(--danger);background:var(--bg)}
.board-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(35,36,31,.08)}
.board-card h3{font-size:15.5px;margin-bottom:3px}
.board-card .meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.prog{height:7px;background:var(--bg);border-radius:5px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .3s}
.prog-row{display:flex;justify-content:space-between;font-size:11.5px;font-weight:600;color:var(--muted);margin-top:6px}
.new-board{border:1px solid var(--line-strong);background:#FFFEFB;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-weight:600;min-height:130px;cursor:pointer}
.new-board:hover{color:var(--accent);border-color:var(--accent)}
.catbar{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.catbar::-webkit-scrollbar{display:none}
.catchip{flex:none;display:inline-flex;align-items:center;gap:7px;border-radius:18px;padding:8px 15px;font-size:12.5px;font-weight:700;color:#fff;opacity:.55;cursor:pointer;white-space:nowrap}
.catchip.sel{opacity:1;box-shadow:0 3px 10px rgba(35,36,31,.18)}
.catchip .cnt{font-size:10.5px;font-weight:800;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 7px}
.board-wrap{display:flex;gap:14px;align-items:flex-start}
.rail{display:none;flex-direction:column;gap:7px;width:150px;flex:none}
.rcol{display:flex;align-items:center;gap:7px;border-radius:10px;padding:10px 12px;color:#fff;font-weight:700;font-size:12.5px;opacity:.6;cursor:pointer;text-align:left}
.rcol.sel{opacity:1;box-shadow:0 3px 10px rgba(35,36,31,.18)}
.rcol .rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcol .rcount{font-size:10.5px;font-weight:800;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 7px}
.add-rail{border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px;font-weight:600;color:var(--muted);font-size:12px}
.add-rail:hover{color:var(--accent);border-color:var(--accent)}
.open-col{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.col-head{display:flex;align-items:center;gap:9px;padding:13px 16px;color:#fff}
.col-head h3{flex:1;font-size:15px}
.col-head button{color:#fff;opacity:.75;padding:3px}
.col-head button:hover{opacity:1}
.col-head .count{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.22);border-radius:10px;padding:2px 9px}
.quickadd{display:flex;gap:8px;margin:14px 16px 0}
.quickadd input{border-radius:10px}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:12px;padding:14px 16px 18px}
.note{background:var(--note-bg,#fff);border:1px solid var(--line);border-left:4px solid var(--note-c,var(--accent));border-radius:10px;padding:12px 12px 10px;cursor:pointer;position:relative;transition:transform .1s,box-shadow .1s}
.note:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(35,36,31,.09)}
.note h4{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:5px;padding-right:18px}
.note p{font-size:12px;color:#6b695f;line-height:1.45;margin-bottom:7px;white-space:pre-wrap}
.note.done{opacity:.5}
.note .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.note .who{font-size:10.5px;font-weight:700;color:var(--muted);flex:1}
.note .avatar{width:21px;height:21px;font-size:9px}
.note-del{position:absolute;top:7px;right:7px;color:#a3a094;opacity:0;transition:opacity .15s;padding:2px}
.note:hover .note-del{opacity:.9}
.note-del:hover{color:var(--danger)}
@media(hover:none){.note-del{opacity:.5}}
.due{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;margin-bottom:6px}
.chk{width:19px;height:19px;border-radius:6px;border:2px solid var(--line-strong);background:#fff;color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex:none}
.chk.on{background:var(--ok);border-color:var(--ok)}
.task-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-left:4px solid var(--c,var(--accent));border-radius:10px;background:#fff;margin-bottom:8px}
.task-row .t{flex:1;min-width:0}
.task-row .t b{display:block;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row .t span{font-size:11px;font-weight:600;color:var(--muted)}
.task-row.done{opacity:.55}
.member-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.member-row .m{flex:1;min-width:0}
.member-row .m b{display:block;font-size:14px}
.member-row .m span{font-size:11.5px;color:var(--muted)}
.rolebadge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border-radius:8px;padding:2px 8px;background:var(--accent-soft);color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(35,36,31,.45);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:4px}
.row{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:80;display:flex;gap:14px;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:92vw}
.toast button{color:#FFC98F;font-weight:800}
.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:22px}
.auth-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 24px;width:100%;max-width:400px}
.auth-card h3{font-size:18px;margin-bottom:2px}
.auth-card .sub{font-size:13px;color:var(--muted);margin-bottom:10px}
.auth-err{background:#FDECEA;color:#A32D2D;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:600;margin:10px 0 0;display:none}
.cobrand{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));right:12px;z-index:15;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:11px;font-weight:700;color:var(--muted);box-shadow:0 4px 14px rgba(35,36,31,.08)}
.cobrand b{color:var(--accent)}
.swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.swatches button{width:34px;height:34px;border-radius:50%;border:3px solid transparent}
.swatches button.sel{border-color:var(--ink)}
.settings-grid{display:grid;gap:14px;grid-template-columns:1fr}
.empty{color:var(--muted);font-weight:500;font-size:13.5px;padding:14px 4px}
/* money tabs + budget */
.mtabs{display:inline-flex;background:#fff;border:1px solid var(--line-strong);border-radius:11px;padding:3px;gap:2px}
.mtabs button{font-size:13px;font-weight:700;color:var(--muted);padding:6px 15px;border-radius:8px}
.mtabs button.on{background:var(--accent);color:#fff}
.track{height:9px;background:#EDEBE4;border-radius:6px;overflow:hidden;display:flex}
.fill{height:100%}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.tile .k{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
.tile .v{font-size:21px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.tile .s{font-size:11.5px;color:var(--muted);margin-top:2px}
.bcols{display:grid;grid-template-columns:minmax(160px,1fr) 120px 135px 110px;gap:12px;align-items:center}
.bhead{padding:0 2px 9px;border-bottom:1px solid var(--line-strong)}
.bhead span{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.br{text-align:right}
.brow{padding:13px 2px;border-bottom:1px solid var(--line)}
.brow.click{cursor:pointer}
.brow.click:hover{background:var(--bg)}
.bcat{font-weight:700;font-size:14px}
.bsubline{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.bstatus{font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.bnum{font-variant-numeric:tabular-nums;font-weight:700;font-size:13.5px}
.bsub{display:block;font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.bplanned{font-variant-numeric:tabular-nums;font-weight:700;font-size:13.5px;border:1px dashed var(--line-strong);border-radius:8px;padding:4px 8px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:#fff}
.bplanned .pen{color:var(--muted);font-size:11px}
.barwrap{display:flex;align-items:center;gap:10px;margin-top:10px}
.barwrap .track{flex:1}
.pct{font-size:11px;font-weight:800;width:40px;text-align:right;font-variant-numeric:tabular-nums;flex:none}
.autotag{font-size:9.5px;font-weight:800;color:var(--muted);background:var(--bg);border-radius:6px;padding:2px 5px;margin-left:5px}
.lnk{font-size:10.5px;font-weight:700;color:var(--accent);background:none;padding:0;line-height:1;cursor:pointer}
.lnk.danger{color:var(--muted)}
.baddrow{display:flex;gap:10px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line)}
.baddrow input{border-style:dashed;padding:8px 10px;font-size:13px}
.btotrow{padding:13px 2px 2px;border-top:2px solid var(--line-strong);margin-top:2px}
.btotrow .bcat,.btotrow .bnum{font-weight:800;font-size:14.5px}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
.blab{display:none}
/* plan canvas */
.plan-stage{position:relative;height:560px;overflow:auto;border:1px solid var(--line);border-radius:var(--radius);
  background-image:radial-gradient(var(--line-strong) 1px,transparent 1px);background-size:20px 20px;background-color:#fcfbf9}
.pnode{position:absolute;z-index:3;width:150px;background:#fff;border:1px solid var(--line-strong);border-left:4px solid var(--pc,#888);border-radius:11px;padding:9px 11px;box-shadow:0 2px 6px rgba(30,20,10,.06);cursor:grab;user-select:none;touch-action:none}
.pnode:active{cursor:grabbing}
.pnode .pt{font-size:12.5px;font-weight:700;line-height:1.25;pointer-events:none}
.pnode .pd{font-size:10.5px;color:var(--muted);margin-top:3px;pointer-events:none}
.pnode.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),0 6px 16px rgba(199,91,18,.18)}
.pnode.done{opacity:.55}
.pnode.done .pt{text-decoration:line-through}
.pbadge{position:absolute;top:-9px;right:-8px;background:var(--ok);color:#fff;font-size:9px;font-weight:800;border-radius:20px;padding:2px 7px;box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none}
.pwire-x{position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid var(--line-strong);color:var(--muted);font-size:10px;font-weight:800;line-height:16px;text-align:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.12);padding:0;z-index:4}
.pwire-x:hover{color:var(--danger);border-color:var(--danger)}
.pswatch{display:flex;gap:8px;margin-top:4px}
.pswatch button{width:26px;height:26px;border-radius:8px;border:2px solid transparent;padding:0}
.pswatch button.sel{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
.pframe{position:absolute;z-index:1;border:1.5px dashed;border-radius:14px;user-select:none;touch-action:none;cursor:grab}
.pframe:active{cursor:grabbing}
.pframe-lbl{position:absolute;top:-10px;left:12px;color:#fff;font-size:10px;font-weight:800;border-radius:20px;padding:2px 9px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15);z-index:2;white-space:nowrap}
.pframe-rs{position:absolute;right:-6px;bottom:-6px;width:12px;height:12px;border-radius:4px;background:#fff;border:1.5px solid var(--line-strong);cursor:nwse-resize;z-index:2;touch-action:none}
.pbadge.post{background:#C4356B;left:-8px;right:auto}
.pchan{border:2px solid transparent;border-radius:9px;padding:3px;background:transparent;cursor:pointer;opacity:.4}
.pchan.on{opacity:1;border-color:var(--ink)}
@media(max-width:640px){
  .bcols{grid-template-columns:1fr 1fr;gap:8px 12px}
  .bcols>div:first-child{grid-column:1/3}
  .bcols>.br{text-align:left}
  .bhead{display:none}
  .blab{display:block;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
}
@media(min-width:840px){
  .sidebar{display:flex;flex-direction:column;width:214px;flex:none;background:#fff;border-right:1px solid var(--line);padding:14px 10px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .topbar{display:none}
  .bottomnav{display:none}
  main{padding:22px 28px;padding-bottom:40px}
  .rail{display:flex}
  .catbar{display:none}
  .overlay{align-items:center;padding:20px}
  .modal{border-radius:18px;padding:24px}
  .toast{bottom:28px}
  .cobrand{bottom:14px}
  .settings-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>

function hexPick(gridId,v){
  if(!/^#?[0-9a-fA-F]{6}$/.test(v.trim()))return;
  const hex=v.trim().startsWith('#')?v.trim():'#'+v.trim();
  const g=$(gridId); if(!g)return;
  g.querySelectorAll('button').forEach(b=>b.classList.toggle('sel',b.dataset.c.toLowerCase()===hex.toLowerCase()));
  g.dataset.custom=hex;
}
function gridColor(id,fallback){
  const g=$(id); if(!g)return fallback;
  const hexEl=$(id+'-hex');
  if(hexEl&&/^#?[0-9a-fA-F]{6}$/.test(hexEl.value.trim())){const v=hexEl.value.trim();return v.startsWith('#')?v:'#'+v;}
  const sel=g.querySelector('.sel'); return sel?sel.dataset.c:fallback;
}

/* toast with optional undo action */
let _toastT=null,_toastFn=null;
function toast(msg,actionLabel,actionFn){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  clearTimeout(_toastT); _toastFn=actionFn||null;
  const el=document.createElement('div'); el.className='toast';
  el.innerHTML=`<span>${msg}</span>${actionLabel?`<button onclick="_toastFn&&_toastFn();this.parentElement.remove()">${actionLabel}</button>`:''}`;
  document.body.appendChild(el);
  _toastT=setTimeout(()=>el.remove(),actionLabel?6000:3200);
}

function planEff(){
  if(!WS)return 'free';
  if(WS.plan==='agency')return 'agency';
  if(WS.plan==='pro')return 'pro';
  if(WS.plan==='basic')return 'basic';
  if(WS.plan==='trial'&&WS.trial_ends>=saDate())return 'pro';
  return 'free';
}
const paidAI=()=>['pro','agency'].includes(planEff());
function trialDaysLeft(){
  if(!WS||WS.plan!=='trial')return 0;
  return Math.max(0,Math.round((new Date(WS.trial_ends)-new Date(saDate()))/86400000));
}
function applyTheme(){
  const t=(WS&&WS.theme)||{};
  const p=PRESETS[t.preset]||PRESETS.classic;
  const accent=t.accent||p.accent;
  document.documentElement.style.setProperty('--accent',accent);
  document.documentElement.style.setProperty('--accent-soft',tint(accent,12));
}

async function loadWs(){
  const {data:mems,error}=await sb.from('bbe_members').select('*').eq('user_id',SESSION.user.id);
  if(error)throw error;
  MYWS=mems||[];
  if(!MYWS.length){WS=null;MEM=null;return;}
  const savedWs=localStorage.getItem('bbe_ws');
  MEM=MYWS.find(m=>m.workspace_id===savedWs)||MYWS[0];
  const [w,mm,b]=await Promise.all([
    sb.from('bbe_workspaces').select('*').eq('id',MEM.workspace_id).single(),
    sb.from('bbe_members').select('*').eq('workspace_id',MEM.workspace_id).order('created_at'),
    sb.from('bbe_boards').select('*').eq('workspace_id',MEM.workspace_id).order('created_at'),
  ]);
  if(w.error)throw w.error;
  WS=w.data; MEMBERS=mm.data||[]; BOARDS=b.data||[];
  localStorage.setItem('bbe_ws',WS.id);
  if(!BOARDS.find(x=>x.id===S.board))S.board=localStorage.getItem('bbe_board_'+WS.id);
  if(!BOARDS.find(x=>x.id===S.board))S.board=BOARDS[0]?BOARDS[0].id:null;
  applyTheme();
}
async function loadBoard(){
  if(!S.board){cur={cols:[],notes:[],msgs:[],invs:[],pins:[],posts:[],budget:[],planNodes:[],planEdges:[],planFrames:[]};return;}
  const [c,n,m,iv,p,po,bd,pn,pe,pf]=await Promise.all([
    sb.from('bbe_columns').select('*').eq('board_id',S.board).order('position'),
    sb.from('bbe_notes').select('*').eq('board_id',S.board),
    sb.from('bbe_messages').select('*').eq('board_id',S.board).order('created_at',{ascending:false}).limit(40),
    sb.from('bbe_invoices').select('*').eq('board_id',S.board).order('created_at'),
    sb.from('bbe_pins').select('*').eq('board_id',S.board).order('created_at'),
    sb.from('bbe_posts').select('*').eq('board_id',S.board).order('post_date'),
    sb.from('bbe_budget').select('*').eq('board_id',S.board).order('position'),
    sb.from('bbe_plan_nodes').select('*').eq('board_id',S.board).order('position'),
    sb.from('bbe_plan_edges').select('*').eq('board_id',S.board),
    sb.from('bbe_plan_frames').select('*').eq('board_id',S.board).order('position'),
  ]);
  if(c.error)throw c.error;
  cur={cols:c.data||[],notes:n.data||[],msgs:(m.data||[]).reverse(),invs:iv.data||[],pins:p.data||[],posts:po.data||[],budget:bd.data||[],planNodes:pn.data||[],planEdges:pe.data||[],planFrames:pf.data||[]};
}

/* today */
const tdDone=t=>t.note_id?!!(TDN[t.note_id]&&TDN[t.note_id].done):!!t.done;
async function loadToday(){
  if(!WS)return;
  const {data}=await sb.from('bbe_today').select('*').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).eq('for_date',saDate()).order('position');
  TD=data||[]; TDN={};TDC={};
  const ids=TD.map(t=>t.note_id).filter(Boolean);
  if(ids.length){
    const [{data:ns},{data:cs}]=await Promise.all([
      sb.from('bbe_notes').select('id,title,done,archived,due_date,warn_days,column_id,board_id').in('id',ids),
      sb.from('bbe_columns').select('id,name,color,board_id').eq('workspace_id',WS.id),
    ]);
    (ns||[]).forEach(n=>TDN[n.id]=n);(cs||[]).forEach(c=>TDC[c.id]=c);
  }
}
async function ensureToday(){
  if(!WS)return;
  const today=saDate();
  const {data:ex}=await sb.from('bbe_today').select('id').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).eq('for_date',today).limit(1);
  if(ex&&ex.length){await loadToday();return;}
  const rows=[];let pos=0;
  const {data:prev}=await sb.from('bbe_today').select('*').eq('user_id',SESSION.user.id).eq('workspace_id',WS.id).lt('for_date',today).order('for_date',{ascending:false}).limit(40);
  const prevDate=prev&&prev.length?prev[0].for_date:null; const carried=new Set();
  if(prevDate){
    const pids=prev.filter(p=>p.for_date===prevDate&&!p.removed&&p.note_id).map(p=>p.note_id);
    let open={};
    if(pids.length){const {data:pn}=await sb.from('bbe_notes').select('id,done,archived').in('id',pids);(pn||[]).forEach(n=>open[n.id]=n);}
    for(const p of prev.filter(p=>p.for_date===prevDate&&!p.removed)){
      if(p.note_id){const n=open[p.note_id];if(n&&!n.done&&!n.archived){rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,note_id:p.note_id,reason:'carried over',position:pos++});carried.add(p.note_id);}}
      else if(!p.done&&p.text_line)rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,text_line:p.text_line,reason:'carried over',position:pos++});
    }
  }
  const {data:cand}=await sb.from('bbe_notes').select('id,done,archived,due_date,warn_days,assignee').eq('workspace_id',WS.id).eq('done',false).eq('archived',false).not('due_date','is',null);
  const t0=new Date(today+'T00:00:00Z').getTime();
  for(const n of (cand||[])){
    if(carried.has(n.id))continue;
    if(n.assignee&&n.assignee!==SESSION.user.id)continue;
    const days=Math.round((new Date(n.due_date+'T00:00:00Z').getTime()-t0)/86400000);
    if(days>(n.warn_days??7))continue;
    rows.push({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,note_id:n.id,reason:days<0?'overdue':'due soon',position:pos++});
  }
  if(rows.length){const {error}=await sb.from('bbe_today').insert(rows);if(error)console.error(error);}
  else await sb.from('bbe_today').insert({workspace_id:WS.id,user_id:SESSION.user.id,for_date:today,text_line:null,reason:'__init__',removed:true,position:0});
  await loadToday();
}

    <button class="sb-item ${S.view==='settings'?'on':''}" onclick="go('settings')">${ic('gear',16)}<span>Settings</span></button>

  const sideHead=nav.ws
    ?`<div class="sb-brand" onclick="go('boards')">${esc(WS.name)} <small>· BOARDS</small></div>`
    :`<button class="sb-back" onclick="leaveBoard()">‹ All boards</button>
      <div class="sb-bhead"><span class="sb-sw" style="background:${b?b.color||'var(--accent)':'var(--accent)'}"></span><select class="sb-switch" onchange="switchBoardTo(this.value)">${BOARDS.map(x=>`<option value="${x.id}" ${x.id===S.board?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div>`;
  app.innerHTML=`
  <div class="appshell">
    <aside class="sidebar">${sideHead}<div>${nav.items.map(sItem).join('')}${nav.ws?boardsSideNav():''}</div>${foot}</aside>
    <div class="contentarea">
      <div class="topbar">
        ${nav.ws?`<div class="wordmark" onclick="go('boards')">${esc(WS.name)} <small>· Boards</small></div>`:`<button class="tb-back" onclick="leaveBoard()">‹</button><div class="wordmark">${esc(b?b.name:'')}</div>`}
        <span style="flex:1"></span>
        ${WS.plan!=='basic'&&_credits!==null?`<span class="pill" style="background:var(--accent);cursor:pointer" onclick="go('settings')">✦ ${_credits}</span>`:''}
        <span onclick="go('settings')" style="cursor:pointer">${avatar(MEM)}</span>
      </div>
      <main>${viewFn()}</main>
      <div class="bottomnav">${nav.items.map(bItem).join('')}</div>
    </div>
  </div>
  ${planEff()==='free'?`<a class="cobrand" href="https://brandexpert.co.za" target="_blank" rel="noopener">powered by <b>Brand Expert</b></a>`:''}`;
}
function go(v){
  const bv=['btoday','board','plan','content','binbox','files','money','team','setup'];
  S.scope=bv.includes(v)?'board':'workspace';
  S.view=v;
  if(v==='content')_contentAll=false;
  if(v==='today')loadToday().then(render).catch(fail);
  render();
}
function leaveBoard(){S.scope='workspace';go('boards');}
async function switchBoardTo(id){S.board=id;localStorage.setItem('bbe_board_'+WS.id,id);S.col=null;await loadBoard();go('btoday');}
function navItems(){
  if(S.scope==='board'&&S.board){
    const b=BOARDS.find(x=>x.id===S.board);
    if(b){
      const m=b.modules||{content:true,inbox:true,money:true,team:true};
      const items=[['btoday','sun','Today']];
      if(m.plan!==false)items.push(['plan','route','Plan']);
      items.push(['board','board','Board']);
      if(m.content)items.push(['content','calendar','Content']);
      if(m.inbox)items.push(['binbox','mail','Inbox']);
      if(m.files)items.push(['files','note','Files']);
      if(m.money)items.push(['money','money','Money']);
      if(m.team)items.push(['team','users','Team']);
      items.push(['setup','gear','Setup']);
      return {ws:false,items,board:b};
    }
  }
  return {ws:true,items:[['boards','home','Dashboard'],['today','sun','Today'],['inbox','mail','Inbox']]};
}

async function doSignIn(){

async function doSignUp(){
  const name=$('a-name').value.trim(),ws=$('a-ws').value.trim(),email=$('a-email').value.trim(),pw=$('a-pw').value;
  if(!name||!ws||!email||pw.length<8){authErr('Fill in everything — password at least 8 characters.');return;}
  const b=$('a-go');b.disabled=true;b.textContent='Creating…';
  try{
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-signup`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},body:JSON.stringify({email,password:pw,name,workspace:ws})});
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Could not create the workspace');
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error&&!/confirm/i.test(error.message))throw error;
    const {data:{session}}=await sb.auth.getSession(); SESSION=session;
    if(SESSION)await boot(); else {_authMode='in';render();}
    toast('📬 Almost there — confirm your email via the link we just sent');

}

function tdReason(t){
  if(!t.note_id)return t.reason==='carried over'?'carried over':'';
  const n=TDN[t.note_id]; if(!n)return t.reason;
  if(n.due_date){
    const days=Math.round((new Date(n.due_date+'T00:00:00Z')-new Date(saDate()+'T00:00:00Z'))/86400000);
    if(days<0)return `overdue ${-days}d`; if(days===0)return 'due today';
    if(days<=(n.warn_days??7))return `due in ${days}d`;
  }
  return t.reason==='carried over'?'carried over':'';
}

function planDragStart(ev,id){
  if(ev.target.closest('button'))return;
  if(_planConnect){planPickConnect(id);return;}
  const node=cur.planNodes.find(x=>x.id===id); if(!node)return;
  ev.preventDefault();
  const el=ev.currentTarget;
  _pd={id,el,sx:ev.clientX,sy:ev.clientY,ox:Number(node.x)||0,oy:Number(node.y)||0,moved:false};
  if(el.setPointerCapture)try{el.setPointerCapture(ev.pointerId);}catch(_){}
  el.onpointermove=e=>{
    if(!_pd)return;
    const dx=e.clientX-_pd.sx,dy=e.clientY-_pd.sy;
    if(Math.abs(dx)>4||Math.abs(dy)>4)_pd.moved=true;
    if(!_pd.moved||!canManage())return;
    el.style.left=Math.max(0,_pd.ox+dx)+'px';
    el.style.top=Math.max(0,_pd.oy+dy)+'px';
  };
  el.onpointerup=async e=>{
    el.onpointermove=null; el.onpointerup=null;
    const d=_pd; _pd=null; if(!d)return;
    if(!d.moved){planNodeModal(id);return;}
    if(!canManage())return;
    const nx=Math.max(0,Math.round(d.ox+(e.clientX-d.sx))),ny=Math.max(0,Math.round(d.oy+(e.clientY-d.sy)));
    const n2=cur.planNodes.find(x=>x.id===id); if(n2){n2.x=nx;n2.y=ny;}
    render();
    try{const {error}=await sb.from('bbe_plan_nodes').update({x:nx,y:ny}).eq('id',id);if(error)throw error;}catch(err){fail(err);}
  };
}

async function planToBoard(){
  if(!canManage())return;
  const todo=cur.planNodes.filter(n=>!n.note_id&&(n.kind||'step')!=='post');
  if(!todo.length){toast('Every step is already on the board');return;}
  try{
    const frames=cur.planFrames||[];
    const frameFor=n=>{
      const cx=(Number(n.x)||0)+75,cy=(Number(n.y)||0)+27;
      return frames.find(f=>{const fx=Number(f.x)||0,fy=Number(f.y)||0;return cx>=fx&&cx<=fx+(Number(f.w)||0)&&cy>=fy&&cy<=fy+(Number(f.h)||0);});
    };
    const colCache={};
    const colFor=async f=>{
      const key=(f.name||'zone').trim().toLowerCase();
      if(colCache[key])return colCache[key];
      let col=cur.cols.find(c=>(c.name||'').trim().toLowerCase()===key);
      if(!col){
        const {data,error}=await sb.from('bbe_columns').insert({workspace_id:WS.id,board_id:S.board,name:(f.name||'Zone').trim(),color:f.color||CYCLE[cur.cols.length%CYCLE.length],position:cur.cols.length}).select().single();
        if(error)throw error;
        cur.cols.push(data); col=data;
      }
      colCache[key]=col.id; return col.id;
    };
    let firstCol=null,added=0;
    for(const n of todo){
      const f=frameFor(n);
      let colId;
      if(f)colId=await colFor(f);
      else{if(!firstCol)firstCol=await planFirstCol();colId=firstCol;}
      await planInsertTask(n,colId);added++;
    }
    await loadBoard();render();
    toast(added+' step'+(added!==1?'s':'')+' added to the board');
  }catch(e){fail(e);}
}

async function planPushBudget(){
  if(!canManage())return;
  const sums={};
  (cur.planNodes||[]).forEach(n=>{
    const c=Number(n.cost)||0,cat=(n.budget_cat||'').trim();
    if(c>0&&cat)sums[cat]=(sums[cat]||0)+c;
  });
  const names=Object.keys(sums);
  if(!names.length){toast('Add a cost and a budget category to steps first');return;}
  try{
    let pos=cur.budget.filter(b=>!b.parent_id).length;
    for(const name of names){
      const ex=cur.budget.find(b=>!b.parent_id&&(b.name||'').trim().toLowerCase()===name.toLowerCase());
      if(ex){const {error}=await sb.from('bbe_budget').update({planned:sums[name]}).eq('id',ex.id);if(error)throw error;}
      else{const {error}=await sb.from('bbe_budget').insert({workspace_id:WS.id,board_id:S.board,name,planned:sums[name],position:pos++});if(error)throw error;}
    }
    await loadBoard();render();
    toast('Budget updated from plan ('+names.length+(names.length!==1?' categories':' category')+')');
  }catch(e){fail(e);}
}

function planFrameDragStart(ev,id){
  if(ev.target.closest('.pframe-lbl,.pframe-rs,.pnode,button'))return;
  if(!canManage())return;
  const f=cur.planFrames.find(x=>x.id===id); if(!f)return;
  ev.preventDefault();
  const el=ev.currentTarget;
  _pf={id,el,sx:ev.clientX,sy:ev.clientY,ox:Number(f.x)||0,oy:Number(f.y)||0,moved:false};
  if(el.setPointerCapture)try{el.setPointerCapture(ev.pointerId);}catch(_){}
  el.onpointermove=e=>{
    if(!_pf)return;
    const dx=e.clientX-_pf.sx,dy=e.clientY-_pf.sy;
    if(Math.abs(dx)>4||Math.abs(dy)>4)_pf.moved=true;
    if(!_pf.moved)return;
    el.style.left=Math.max(0,_pf.ox+dx)+'px';
    el.style.top=Math.max(0,_pf.oy+dy)+'px';
  };
  el.onpointerup=async e=>{
    el.onpointermove=null; el.onpointerup=null;
    const d=_pf; _pf=null; if(!d||!d.moved)return;
    const nx=Math.max(0,Math.round(d.ox+(e.clientX-d.sx))),ny=Math.max(0,Math.round(d.oy+(e.clientY-d.sy)));
    const f2=cur.planFrames.find(x=>x.id===id); if(f2){f2.x=nx;f2.y=ny;}
    render();
    try{const {error}=await sb.from('bbe_plan_frames').update({x:nx,y:ny}).eq('id',id);if(error)throw error;}catch(err){fail(err);}
  };
}
function planFrameResizeStart(ev,id){
  if(!canManage())return;

  ev.preventDefault(); ev.stopPropagation();
  const el=ev.currentTarget,frameEl=el.closest('.pframe');
  const st={sx:ev.clientX,sy:ev.clientY,ow:Number(f.w)||340,oh:Number(f.h)||240};
  if(el.setPointerCapture)try{el.setPointerCapture(ev.pointerId);}catch(_){}
  el.onpointermove=e=>{
    const w=Math.max(160,Math.round(st.ow+(e.clientX-st.sx))),h=Math.max(120,Math.round(st.oh+(e.clientY-st.sy)));
    if(frameEl){frameEl.style.width=w+'px';frameEl.style.height=h+'px';}
  };
  el.onpointerup=async e=>{
    el.onpointermove=null; el.onpointerup=null;
    const w=Math.max(160,Math.round(st.ow+(e.clientX-st.sx))),h=Math.max(120,Math.round(st.oh+(e.clientY-st.sy)));

  };
}

function dueChip(n){

  if(n.done)return `<span class="due" style="background:rgba(0,0,0,.06);color:var(--muted)">${ic('calendar',10)} ${label}</span>`;
  if(days<0)return `<span class="due" style="background:var(--danger);color:#fff">${ic('alert',10)} ${label} · ${-days}d over</span>`;

}

/* ---- budget tab (categories + one level of sub-categories + notes) ---- */
function budgetModel(){
  const out=cur.invs.filter(i=>i.kind==='out');
  const byB={}; out.forEach(i=>{if(i.budget_id){(byB[i.budget_id]=byB[i.budget_id]||[]).push(i);}});
  const all=cur.budget;
  const kidsOf=pid=>all.filter(b=>b.parent_id===pid).sort((a,b)=>(a.position??0)-(b.position??0));
  const stat=list=>{const actual=_sumInv(list),paid=_sumInv((list||[]).filter(i=>i.paid));return{actual,paid,outstanding:actual-paid};};
  const leaf=b=>({id:b.id,name:b.name,note:b.note,parent_id:b.parent_id,type:'leaf',planned:Number(b.planned||0),...stat(byB[b.id])});
  const nodes=all.filter(b=>!b.parent_id).sort((a,b)=>(a.position??0)-(b.position??0)).map(p=>{
    const kids=kidsOf(p.id).map(leaf);
    if(!kids.length)return leaf(p);
    const direct=stat(byB[p.id]);
    const planned=kids.reduce((t,k)=>t+k.planned,0);
    const actual=kids.reduce((t,k)=>t+k.actual,0)+direct.actual;
    const paid=kids.reduce((t,k)=>t+k.paid,0)+direct.paid;
    return{id:p.id,name:p.name,note:p.note,type:'parent',kids,planned,actual,paid,outstanding:actual-paid};
  });
  const ids=new Set(all.map(b=>b.id));
  const uncatList=out.filter(i=>!i.budget_id||!ids.has(i.budget_id));
  return {nodes,uncat:{name:'Uncategorised',...stat(uncatList)}};
}
function _bStatus(planned,actual){
  if(actual>planned&&planned>=0&&(actual>0))return['⚠ over budget','var(--danger)'];
  if(planned>0&&actual===planned)return['◆ fully used','var(--warn)'];
  if(planned>0&&actual/planned>=0.85)return['◆ near limit','var(--warn)'];
  if(actual>0)return['● on track','var(--ok)'];
  return['○ untouched','var(--muted)'];
}
function _bBar(paid,outstanding,planned){
  const actual=paid+outstanding;const over=actual>planned&&actual>0;
  const color=over?'var(--danger)':(planned>0&&actual/planned>=0.85?'var(--warn)':'var(--ok)');
  const w=planned>0?Math.min(actual,planned)/planned:0;
  const pw=planned>0?Math.min(paid,planned)/planned:0;
  const dw=Math.max(0,w-pw);
  const pct=planned>0?Math.round(actual/planned*100)+'%':(actual>0?'—':'0%');
  return `<div class="barwrap"><div class="track"><div class="fill" style="width:${(pw*100).toFixed(1)}%;background:${color}"></div><div class="fill" style="width:${(dw*100).toFixed(1)}%;background:${color};opacity:.45"></div></div><span class="pct" style="${over?'color:var(--danger)':''}">${pct}</span></div>`;
}
function _bAct(n){return `<span class="blab">Actual</span><span class="bnum">${Rand(n.actual)}</span><span class="autotag">auto</span>
    <span class="bsub"><span style="color:var(--ok)">${Rand(n.paid)} paid</span>${n.outstanding>0?` · <span style="color:var(--warn)">${Rand(n.outstanding)} due</span>`:''}</span>`;}
function _bRem(planned,actual){const rem=planned-actual;const col=rem<0?'var(--danger)':rem===0?'var(--warn)':'var(--ok)';return `<span class="blab">Remaining</span><span class="bnum" style="color:${col}">${rem<0?'−'+Rand(-rem):Rand(rem)}</span>`;}
function _bNoteHtml(note){return note?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">${esc(note)}</div>`:'';}
function _bActions(id,opts){
  if(!canManage())return '';
  opts=opts||{};
  return `${opts.spend?`<button class="lnk" onclick="event.stopPropagation();budgetAddSpend('${id}')">+ spend</button>`:''}
    ${opts.sub?`<button class="lnk" onclick="event.stopPropagation();budgetAddSub('${id}')">+ sub</button>`:''}
    <button class="lnk" onclick="event.stopPropagation();budgetEditNote('${id}')">${opts.hasNote?'edit note':'+ note'}</button>
    <button class="lnk danger" onclick="event.stopPropagation();budgetDelCat('${id}')" title="Delete">${ic('x',10)}</button>`;
}
function _bLeafRow(n,isChild){
  const st=_bStatus(n.planned,n.actual);
  return `<div class="brow click" style="${isChild?'padding-left:22px;background:linear-gradient(90deg,var(--bg) 0 3px,transparent 3px)':''}" onclick="budgetJump('${n.id}')" title="View this line's invoices">
    <div class="bcols">
      <div><div class="bcat" style="${isChild?'font-weight:600;font-size:13px':''}">${isChild?'<span style="color:var(--muted)">↳ </span>':''}${esc(n.name)}</div>
        ${_bNoteHtml(n.note)}
        <div class="bsubline"><span class="bstatus" style="color:${st[1]}">${st[0]}</span>
          <span style="font-size:10.5px;font-weight:700;color:var(--muted)">view ›</span>
          ${_bActions(n.id,{spend:true,sub:!isChild,hasNote:!!n.note})}</div></div>
      <div class="br"><span class="blab">Planned</span>${canManage()?`<span class="bplanned" onclick="event.stopPropagation();budgetEditPlanned('${n.id}')">${Rand(n.planned)} <span class="pen">✎</span></span>`:`<span class="bnum">${Rand(n.planned)}</span>`}</div>
      <div class="br">${_bAct(n)}</div>
      <div class="br">${_bRem(n.planned,n.actual)}</div>
    </div>
    ${_bBar(n.paid,n.outstanding,n.planned)}
  </div>`;
}
function _bParentRow(n){
  const exp=_bexp[n.id]!==false;
  const st=_bStatus(n.planned,n.actual);
  return `<div class="brow click" onclick="budgetJump('${n.id}')" title="View every invoice under ${esc(n.name)}">
    <div class="bcols">
      <div><div class="bcat"><button class="lnk" style="color:var(--muted);font-size:13px;margin-right:5px" onclick="event.stopPropagation();budgetToggle('${n.id}')">${exp?'▾':'▸'}</button>${esc(n.name)} <span style="font-size:10.5px;font-weight:700;color:var(--muted)">${n.kids.length} sub${n.kids.length!==1?'s':''}</span></div>
        ${_bNoteHtml(n.note)}
        <div class="bsubline"><span class="bstatus" style="color:${st[1]}">${st[0]}</span>
          ${_bActions(n.id,{sub:true,hasNote:!!n.note})}</div></div>
      <div class="br"><span class="blab">Planned</span><span class="bnum">${Rand(n.planned)}</span><span class="autotag">Σ subs</span></div>
      <div class="br">${_bAct(n)}</div>
      <div class="br">${_bRem(n.planned,n.actual)}</div>
    </div>
    ${_bBar(n.paid,n.outstanding,n.planned)}
  </div>${exp?n.kids.map(k=>_bLeafRow(k,true)).join(''):''}`;
}
function budgetTab(){
  const m=budgetModel();
  const totPlanned=m.nodes.reduce((t,n)=>t+n.planned,0);
  const totActual=m.nodes.reduce((t,n)=>t+n.actual,0)+m.uncat.actual;
  const totRemaining=totPlanned-totActual;
  const totDue=_sumInv(cur.invs.filter(i=>i.kind==='out'&&!i.paid));
  const overCount=m.nodes.filter(n=>n.actual>n.planned&&n.actual>0).length;
  const totPct=totPlanned>0?totActual/totPlanned:0;
  const tiles=`<div class="tiles">
    <div class="tile"><div class="k">Total budget</div><div class="v">${Rand(totPlanned)}</div><div class="s">${m.nodes.length} categor${m.nodes.length===1?'y':'ies'}</div></div>
    <div class="tile"><div class="k">Spent so far</div><div class="v">${Rand(totActual)}</div><div class="s">${totPlanned>0?Math.round(totPct*100)+'% used':'no budget set'}</div></div>
    <div class="tile"><div class="k">Remaining</div><div class="v" style="color:${totRemaining<0?'var(--danger)':'var(--ok)'}">${totRemaining<0?'−'+Rand(-totRemaining):Rand(totRemaining)}</div><div class="s">${totRemaining<0?'over the total budget':'left to spend'}</div></div>
    <div class="tile"><div class="k">Outstanding</div><div class="v" style="color:${totDue>0?'var(--warn)':'var(--ok)'}">${Rand(totDue)}</div><div class="s">unpaid invoices still due</div></div>
    ${overCount>0?`<div class="tile"><div class="k">Over budget</div><div class="v" style="color:var(--danger)">${overCount}</div><div class="s">categor${overCount===1?'y':'ies'} over planned</div></div>`:''}
  </div>`;
  const uncatHtml=m.uncat.actual>0?`<div class="brow">
      <div class="bcols">
        <div><div class="bcat" style="color:var(--muted)">Uncategorised</div>
          <div class="bsubline"><span class="bstatus" style="color:var(--muted)">○ not tagged to a budget line</span></div></div>
        <div class="br"><span class="blab">Planned</span><span class="bnum" style="color:var(--muted)">—</span></div>
        <div class="br">${_bAct(m.uncat)}</div>
        <div class="br"><span class="blab">Remaining</span><span class="bnum" style="color:var(--muted)">—</span></div>
      </div>
      <div class="barwrap"><div class="track"><div class="fill" style="width:${m.uncat.actual>0?(m.uncat.paid/m.uncat.actual*100).toFixed(1):0}%;background:var(--muted)"></div><div class="fill" style="width:${m.uncat.actual>0?(m.uncat.outstanding/m.uncat.actual*100).toFixed(1):0}%;background:var(--muted);opacity:.45"></div></div><span class="pct" style="color:var(--muted)">—</span></div>
    </div>`:'';
  const addRow=canManage()?`<div class="baddrow">
      <input id="bg-name" placeholder="+ Add a category…" style="flex:2;min-width:120px" onkeydown="if(event.key==='Enter')budgetAddCat()">
      <input id="bg-plan" type="number" min="0" placeholder="Planned R" style="flex:1;min-width:90px;text-align:right" onkeydown="if(event.key==='Enter')budgetAddCat()">
      <button class="btn accent sm" onclick="budgetAddCat()">Add</button>
    </div>`:'';
  const totals=`<div class="btotrow">
      <div class="bcols">
        <div class="bcat">Total</div>
        <div class="br"><span class="blab">Planned</span><span class="bnum">${Rand(totPlanned)}</span></div>
        <div class="br"><span class="blab">Actual</span><span class="bnum">${Rand(totActual)}</span></div>
        <div class="br">${_bRem(totPlanned,totActual)}</div>
      </div>
      ${_bBar(_sumInv(cur.invs.filter(i=>i.kind==='out'&&i.paid)),totDue,totPlanned)}
    </div>`;
  return `${tiles}
  <div class="card">
    <div class="bcols bhead"><span>Category</span><span class="br">Planned</span><span class="br">Actual</span><span class="br">Remaining</span></div>
    ${m.nodes.map(n=>n.type==='parent'?_bParentRow(n):_bLeafRow(n,false)).join('')}
    ${uncatHtml}
    ${m.nodes.length||m.uncat.actual>0?'':'<div class="empty">No budget yet — add your first category below, then break it into sub-categories and tag invoices to it.</div>'}
    ${addRow}
    ${totals}
    <div style="font-size:11.5px;color:var(--muted);margin-top:14px;display:flex;gap:16px;flex-wrap:wrap">
      <span><span class="dot" style="background:var(--ok)"></span>paid</span>
      <span><span class="dot" style="background:var(--ok);opacity:.45"></span>outstanding (unpaid)</span>
      <span><span class="dot" style="background:var(--danger)"></span>over budget</span>
      <span><span class="autotag">auto</span> actual is summed from invoices tagged to the line</span>
    </div>
  </div>`;
}
function budgetJump(id){
  const b=cur.budget.find(x=>x.id===id); if(!b){return;}
  const ids=[id].concat(cur.budget.filter(x=>x.parent_id===id).map(x=>x.id));
  _moneyFilter={label:b.name,ids};_moneyTab='cashflow';localStorage.setItem('bbe_mtab','cashflow');render();
}
function budgetAddSpend(id){invModal(id);}
async function budgetAddCat(){
  if(!canManage())return;
  const name=$('bg-name').value.trim(),planned=$('bg-plan').value;
  if(!name){toast('Give the category a name');return;}
  if(cur.budget.some(c=>!c.parent_id&&c.name.trim().toLowerCase()===name.toLowerCase())){toast('That category already exists');return;}
  try{
    const {error}=await sb.from('bbe_budget').insert({workspace_id:WS.id,board_id:S.board,name,planned:Number(planned)||0,position:cur.budget.filter(b=>!b.parent_id).length});
    if(error)throw error;
    await loadBoard();render();toast('Category added');
  }catch(e){fail(e);}
}
async function budgetAddSub(pid){
  if(!canManage())return;
  const p=cur.budget.find(x=>x.id===pid);
  const name=prompt(`Sub-category under "${p?p.name:''}"`);
  if(!name||!name.trim())return;
  try{
    const sibs=cur.budget.filter(b=>b.parent_id===pid);
    const {error}=await sb.from('bbe_budget').insert({workspace_id:WS.id,board_id:S.board,name:name.trim(),planned:0,parent_id:pid,position:sibs.length});
    if(error)throw error;
    _bexp[pid]=true;localStorage.setItem('bbe_bexp',JSON.stringify(_bexp));
    await loadBoard();render();toast('Sub-category added — set its planned amount');
  }catch(e){fail(e);}
}
async function budgetEditPlanned(id){
  if(!canManage())return;
  const c=cur.budget.find(x=>x.id===id); if(!c)return;
  const v=prompt(`Planned amount (R) for "${c.name}"`,Number(c.planned||0));
  if(v===null)return;
  try{
    const {error}=await sb.from('bbe_budget').update({planned:Number(v)||0}).eq('id',id);
    if(error)throw error;
    await loadBoard();render();toast('Planned updated');
  }catch(e){fail(e);}
}
async function budgetEditNote(id){
  if(!canManage())return;
  const c=cur.budget.find(x=>x.id===id); if(!c)return;
  const v=prompt(`Note / description for "${c.name}"`,c.note||'');
  if(v===null)return;
  try{
    const {error}=await sb.from('bbe_budget').update({note:v.trim()||null}).eq('id',id);
    if(error)throw error;
    await loadBoard();render();toast('Note saved');
  }catch(e){fail(e);}
}
async function budgetDelCat(id){
  if(!canManage())return;
  const c=cur.budget.find(x=>x.id===id);
  const kids=cur.budget.filter(x=>x.parent_id===id).length;
  if(!confirm(`Delete "${c?c.name:'this'}"${kids?` and its ${kids} sub-categor${kids===1?'y':'ies'}`:''}? Invoices stay in Cashflow and become Uncategorised.`))return;
  try{
    const {error}=await sb.from('bbe_budget').delete().eq('id',id);
    if(error)throw error;
    if(_moneyFilter&&_moneyFilter.ids.includes(id))_moneyFilter=null;
    await loadBoard();render();toast('Removed');
  }catch(e){fail(e);}
}
function budgetSelectOptions(sel){
  const all=cur.budget;
  const parents=all.filter(b=>!b.parent_id).sort((a,b)=>(a.position??0)-(b.position??0));
  let o='';
  parents.forEach(p=>{
    const kids=all.filter(b=>b.parent_id===p.id).sort((a,b)=>(a.position??0)-(b.position??0));
    if(kids.length){
      o+=`<option value="${p.id}" ${sel===p.id?'selected':''}>${esc(p.name)} (whole)</option>`;
      kids.forEach(k=>o+=`<option value="${k.id}" ${sel===k.id?'selected':''}>&nbsp;&nbsp;↳ ${esc(k.name)}</option>`);
    }else o+=`<option value="${p.id}" ${sel===p.id?'selected':''}>${esc(p.name)}</option>`;
  });
  return o;
}
function invModal(preId){
  openModal(`<h3>Add invoice</h3>
    <label>Type</label><select id="iv-kind"><option value="out">We owe (supplier)</option><option value="in">Owed to us (client)</option></select>
    <label>Who</label><input id="iv-party" placeholder="e.g. SoundHire">
    <label>For</label><input id="iv-descr" placeholder="e.g. Stage audio deposit">
    <label>Budget line (optional, for money out)</label>
    <select id="iv-budget"><option value="">— none —</option>${budgetSelectOptions(preId||'')}</select>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label>Amount (R)</label><input id="iv-amount" type="number" min="0"></div>
      <div style="flex:1"><label>Due date</label><input id="iv-due" type="date"></div>
    </div>
    <div class="row"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn accent" onclick="saveInv()">Add</button></div>`);
}
async function saveInv(){
  const party=$('iv-party').value.trim(),amount=Number($('iv-amount').value||0);
  if(!party||!amount){toast('Who and how much?');return;}
  try{const {error}=await sb.from('bbe_invoices').insert({workspace_id:WS.id,board_id:S.board,kind:$('iv-kind').value,party,descr:$('iv-descr').value.trim(),amount,due_date:$('iv-due').value||null,budget_id:$('iv-budget').value||null});
  if(error)throw error;closeModal();await loadBoard();render();toast('Invoice added');}catch(e){fail(e);}
}
async function payInv(id){const i=cur.invs.find(x=>x.id===id);
  try{await sb.from('bbe_invoices').update({paid:!i.paid,paid_at:!i.paid?new Date().toISOString():null}).eq('id',id);i.paid=!i.paid;render();}catch(e){fail(e);}}
async function delInv(id){
  const i=cur.invs.find(x=>x.id===id);
  try{await sb.from('bbe_invoices').delete().eq('id',id);const copy={...i};cur.invs=cur.invs.filter(x=>x.id!==id);render();
  toast('Invoice removed','Undo',async()=>{await sb.from('bbe_invoices').insert(copy);await loadBoard();render();});}catch(e){fail(e);}
}

function inviteModal(){

    <label>Colour</label><div class="swatches" id="im-colors">${CYCLE.map((c,i)=>`<button type="button" style="background:${c}" class="${i===0?'sel':''}" onclick="pickSwatch(this)" data-c="${c}"></button>`).join('')}</div>

function pickSwatch(el){el.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');
  const hexEl=$(el.parentElement.id+'-hex'); if(hexEl)hexEl.value=el.dataset.c;}
async function sendInvite(){
  const name=$('im-name').value.trim(),email=$('im-email').value.trim(),pw=$('im-pw').value;
  if(!name||!email||pw.length<8){toast('Name, email and an 8-character password');return;}
  const b=$('im-go');b.disabled=true;b.textContent='Adding…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-invite`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({workspace_id:WS.id,email,password:pw,name,role:$('im-role').value,color:document.querySelector('#im-colors .sel').dataset.c})});
    const j=await res.json();
    if(!res.ok||j.error){if(/FREE_LIMIT/.test(j.error||''))throw new Error('Free plan is 3 members — upgrade for more.');throw new Error(j.error||'Could not add');}
    closeModal();await loadWs();render();
    toast(j.emailed?`${name.split(' ')[0]} added — details emailed`:`${name.split(' ')[0]} added — share the password yourself`);
  }catch(e){fail(e);b.disabled=false;b.textContent='Add member';}
}
function editMemberModal(uid){
  const m=MEMBERS.find(x=>x.user_id===uid); if(!m)return;
  openModal(`<h3>Edit ${esc(m.name.split(' ')[0])}</h3>
    <label>Full name</label><input id="em-name" value="${esc(m.name)}">
    ${m.role!=='owner'?`<label>Role</label><select id="em-role"><option value="member" ${m.role==='member'?'selected':''}>Member</option><option value="admin" ${m.role==='admin'?'selected':''}>Admin</option></select>`:''}
    <label>Colour</label><div class="swatches" id="em-colors">${CYCLE.map(c=>`<button type="button" style="background:${c}" class="${c===m.color?'sel':''}" onclick="pickSwatch(this)" data-c="${c}"></button>`).join('')}</div>
    <div class="row"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn accent" onclick="saveMemberEdit('${uid}')">Save</button></div>`);
}
async function saveMemberEdit(uid){
  const m=MEMBERS.find(x=>x.user_id===uid);
  try{
    const {data:{session}}=await sb.auth.getSession();
    const body={action:'update',workspace_id:WS.id,user_id:uid,name:$('em-name').value.trim(),color:document.querySelector('#em-colors .sel').dataset.c};
    if(m.role!=='owner'&&$('em-role'))body.role=$('em-role').value;
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-invite`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},body:JSON.stringify(body)});
    const j=await res.json(); if(!res.ok||j.error)throw new Error(j.error||'Could not update');
    closeModal();await loadWs();render();toast('Member updated');
  }catch(e){fail(e);}
}
async function removeMember(uid){
  const m=MEMBERS.find(x=>x.user_id===uid);
  if(!confirm(`Remove ${m.name} from ${WS.name}? Their tasks become unassigned.`))return;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-invite`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({action:'remove',workspace_id:WS.id,user_id:uid})});
    const j=await res.json(); if(!res.ok||j.error)throw new Error(j.error||'Could not remove');
    await loadWs();render();toast(`${m.name.split(' ')[0]} removed`);
  }catch(e){fail(e);}
}

async function draftAI(){
  const brief=$('po-cap').value.trim()||prompt('What is this post about? One or two lines:');
  if(!brief)return;
  const cap=$('po-cap'); cap.value='✦ Drafting…'; cap.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/bbe-draft`,{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({workspace_id:WS.id,board_id:S.board,platform:$('po-plat').value,brief})});
    const j=await res.json();
    if(j.error==='OUT_OF_CREDITS'){cap.value=brief;cap.disabled=false;toast(j.message||'Out of AI credits — top up in Settings');return;}
    if(!res.ok||j.error)throw new Error(j.error||'Drafting failed');
    cap.value=j.text;
    if(typeof j.credits_left==='number'){_credits=j.credits_left;toast(`✦ Drafted — ${j.credits_left} credits left`);}
  }catch(e){cap.value=brief;fail(e);}
  cap.disabled=false;
}
let _postMedia=[];
function mediaThumb(m,ix){
  return `<span style="position:relative;display:inline-block">${m.type==='image'?`<img src="${m.url}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">`:`<span style="display:flex;width:64px;height:64px;border-radius:8px;background:var(--panel,#F4F3EE);align-items:center;justify-content:center;font-size:22px;border:1px solid var(--line)">🎬</span>`}
  <button type="button" onclick="_postMedia.splice(${ix},1);document.getElementById('po-thumbs').innerHTML=_postMedia.map(mediaThumb).join('')" style="position:absolute;top:-6px;right:-6px;background:var(--ink,#23241f);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:1">✕</button></span>`;

async function uploadPostMedia(files){
  const st=document.getElementById('po-upl');
  for(const f of files){
    if(f.size>50*1024*1024){toast(f.name+' is over 50MB');continue;}
    st.textContent='Uploading '+f.name+'…';
    const path=WS.id+'/'+Date.now()+'-'+f.name.replace(/[^\w.\-]+/g,'_');
    const {error}=await sb.storage.from('post-media').upload(path,f,{upsert:true});
    if(error){toast('Upload failed: '+error.message);continue;}
    const {data}=sb.storage.from('post-media').getPublicUrl(path);
    _postMedia.push({type:f.type.startsWith('video')?'video':'image',url:data.publicUrl});
  }
  st.textContent='';
  document.getElementById('po-thumbs').innerHTML=_postMedia.map(mediaThumb).join('');
}
async function savePost(id){
  const row={workspace_id:WS.id,board_id:S.board,platform:$('po-plat').value,caption:$('po-cap').value.trim(),
    media_note:$('po-media').value.trim(),post_date:$('po-date').value,post_time:$('po-time').value||'09:00',
    status:$('po-status').value,created_by:SESSION.user.id,media:_postMedia};
  if(!row.post_date){toast('Pick a date');return;}
  try{
    if(id){const {error}=await sb.from('bbe_posts').update(row).eq('id',id);if(error)throw error;}
    else{const {error}=await sb.from('bbe_posts').insert(row);if(error)throw error;}
    closeModal();await loadBoard();render();toast(id?'Post updated':'On the calendar');
  }catch(e){fail(e);}
}

    window.fbAsyncInit=function(){FB.init({appId:String(appId),autoLogAppEvents:true,xfbml:false,version:'v21.0'});resolve(window.FB);};
    const s=document.createElement('script');s.src='https://connect.facebook.net/en_US/sdk.js';s.async=true;s.defer=true;s.crossOrigin='anonymous';
    s.onerror=()=>{_fbSdkP=null;reject(new Error('Could not load the Facebook SDK — check your connection and try again'));};
    document.head.appendChild(s);
  });
  return _fbSdkP;
}
async function waEmbeddedConnect(){
  try{
    const cfg=await waApi({action:'config'});
    if(!cfg||!cfg.config_id){toast("WhatsApp connect isn't switched on yet — Meta setup pending");return;}
    await loadFbSdk(cfg.app_id);
    let waPhoneId=null,waWabaId=null;
    const onWaMsg=(event)=>{
      if(!event.origin||!event.origin.endsWith('facebook.com'))return;
      try{
        const d=JSON.parse(event.data);
        if(d&&d.type==='WA_EMBEDDED_SIGNUP'){
          const dd=d.data||d;
          if(dd.phone_number_id)waPhoneId=dd.phone_number_id;
          if(dd.waba_id)waWabaId=dd.waba_id;
        }
      }catch(_){}
    };
    window.addEventListener('message',onWaMsg);
    FB.login(async(response)=>{
      try{
        if(response&&response.authResponse&&response.authResponse.code){
          toast('Finishing WhatsApp setup…');
          const res=await waApi({action:'connect',code:response.authResponse.code,phone_number_id:waPhoneId,waba_id:waWabaId});
          if(res&&res.ok){
            toast('WhatsApp connected: '+(res.display_phone||res.business_name||'your number'));
            if(typeof loadInboxConnects==='function')loadInboxConnects();else render();
          }else{toast((res&&(res.message||res.error))||'WhatsApp connection failed');}
        }else{toast('WhatsApp connection cancelled');}
      }catch(e){fail(e);}
      finally{window.removeEventListener('message',onWaMsg);}
    },{config_id:cfg.config_id,response_type:'code',override_default_response_type:true,extras:{setup:{},featureType:'',sessionInfoVersion:'3'}});
  }catch(e){fail(e);}
}
